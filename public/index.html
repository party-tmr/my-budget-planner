            {nested.map(([ok,campGroups])=>{

                        <td className="px-2 py-2"><BSel value={r.adPlatform} onChange={v=>upd(r.id,{adPlatform:v})} options={Object.keys(PLATFORMS)} bc={PB[r.adPlatform]||"bg-zinc-100 text-zinc-700"}/></td>
                        <td className="px-2 py-2">{r.expiredDate?<DCell value={parseFlexDate(r.expiredDate)} onChange={v=>upd(r.id,{expiredDate:v})}/>:<span className="text-lg text-zinc-300">∞</span>}</td>
                        <td className={`px-2 py-2 ${CL}`}>{r.m.status==="New"?<select value={r.statusOverride==="Schedule"?"Schedule":"New"} onChange={e=>upd(r.id,{statusOverride:e.target.value==="Schedule"?"Schedule":null})} className={`cursor-pointer rounded-full px-2 py-0.5 text-[11px] font-semibold outline-none ring-1 ring-current/20 ${SS[r.statusOverride==="Schedule"?"Schedule":"New"]}`}><option value="New">New</option><option value="Schedule">Schedule</option></select>:<SPill s={r.m.status}/>}</td>
                        <td className="px-2 py-2">{r.startDate?<DCell value={r.startDate} onChange={v=>upd(r.id,{startDate:v})}/>:<span className="text-[11px] text-zinc-300">—</span>}</td>
                        <td className="px-2 py-2">{r.endDate?<DCell value={r.endDate} onChange={v=>upd(r.id,{endDate:v})}/>:<span className="text-[11px] text-zinc-300">—</span>}</td>
                        <td className={`px-2 py-2 text-right tabular-nums ${CL}`}>{m.totalDays}</td>
                        <td className={`px-2 py-2 text-right tabular-nums ${CL}`}>{m.runLabel}</td>
                        {/* FIX: remLabel = "No start" when campaign hasn't started */}
                        <td className={`px-2 py-2 text-right tabular-nums ${CL}`}>{m.remLabel}</td>
                        {/* FIX: Limit & Reserve are campaign-level — shown but not editable per-row (use campaign header) */}
                        <td className="px-2 py-2 text-right tabular-nums text-zinc-400">{fmt(cL)}</td>
                        <td className="px-2 py-2 text-right tabular-nums text-zinc-400">{fmt(cR)}</td>
                        <td className="px-2 py-2 text-right min-w-[90px]"><Inp type="number" value={r.contentBudget} onChange={v=>upd(r.id,{contentBudget:v})} className="text-right font-semibold"/></td>
                        <td className={`px-2 py-2 text-right tabular-nums ${CL}`}>{fmt(m.dailyBudget)}</td>
                        <td className={`px-2 py-2 text-right tabular-nums ${CL}`}>{!hasActuals?<span className="text-[11px] text-zinc-400 italic">No data</span>:<div>{fmt(m.spent)}{importDate&&<div className="text-[9px] text-zinc-400">Updated: {fDS(importDate)}</div>}</div>}</td>
                        <td className="px-2 py-2 text-right">{r.actual==null?<span className="text-[11px] text-zinc-400 italic">No data</span>:<Inp type="number" value={r.actual} onChange={v=>upd(r.id,{actual:v})} className="text-right"/>}</td>
                        <td className="px-2 py-2 text-right"><Inp type="number" value={r.kpiTarget} onChange={v=>upd(r.id,{kpiTarget:v})} className="text-right"/>{r.cpr>0&&<div className="text-[9px] text-zinc-400">Cost per result: {r.cpr}</div>}</td>
                        <td className={`px-2 py-2 ${CL}`}><PBadge p={cp} compact/></td>
                      </tr>);})}
                    <tr className="border-b border-zinc-100"><td colSpan={23} className="pl-10 py-1"><button onClick={()=>addSubContent(head)} className="flex items-center gap-1 text-[11px] text-indigo-500 hover:text-indigo-700 font-medium"><Plus size={12}/> Add content</button></td></tr>
                    </>}
                  </Fragment>);})}
              </Fragment>);})}
          </tbody></table></div>)}
        </section>

        {/* AI Insights */}
        <section className="overflow-hidden rounded-xl border border-indigo-200 bg-gradient-to-br from-indigo-50 to-white shadow-sm">
          <div className="flex items-center gap-2 border-b border-indigo-100 px-4 py-3"><div className="grid h-7 w-7 place-items-center rounded-md bg-gradient-to-br from-indigo-500 to-violet-600 text-white"><Sparkles size={15}/></div><h3 className="text-[14px] font-bold text-zinc-900">AI Insights</h3></div>
          <div className="p-4">{!imported?<div className="flex items-center gap-3 rounded-lg border border-dashed border-indigo-200 bg-white/70 p-4 text-[13px] text-zinc-500"><Wand2 size={18} className="text-indigo-400"/>Click <b>Import performance</b> to activate.</div>:<ul className="space-y-2">{insights.map((ins,i)=>{const ic={shift:"text-indigo-500",alert:"text-rose-500",ok:"text-emerald-500"}[ins.tone];const I2={shift:Wand2,alert:AlertTriangle,ok:Trophy}[ins.tone];return<li key={i} className="flex items-start gap-2 text-[13px] text-zinc-700"><I2 size={15} className={`mt-0.5 shrink-0 ${ic}`}/>{ins.text}</li>;})}</ul>}</div>
        </section>
      </main>
      </>)}

      {showForm&&<CampaignForm brands={allBrands} productsFor={productsFor} onAddProd={(b,n)=>setEP(p=>[...p,{brand:b,product:n}])} onRenameProd={(b,old,nw)=>{const batch=db.batch();rows.filter(r=>r.brand===b&&r.product===old).forEach(r=>batch.update(db.collection(COL).doc(r.id),{product:nw}));batch.commit();}} defaultBrand={brand} today={today} onClose={()=>setShowForm(false)} onCreate={addRows}/>}
      {editRow&&<EditModal row={editRow} brands={allBrands} productsFor={productsFor} onSave={p=>{upd(editRow.id,p);setEditRow(null);}} onClose={()=>setEditRow(null)}/>}
    </div>
  );
}

/* Edit Modal */
function EditModal({row,brands,productsFor,onSave,onClose}){const[br,sBr]=useState(row.brand);const pr=productsFor(br);const[pd,sPd]=useState(row.product);const[ts,sTs]=useState(row.targetSplit||"Ad Group Level");const fld="mt-1 w-full rounded-lg border border-zinc-200 px-3 py-2 text-[14px] outline-none focus:border-indigo-400";return<div className="fixed inset-0 z-50 flex items-center justify-center bg-zinc-900/40 backdrop-blur-sm p-4" onClick={onClose}><div className="w-full max-w-sm rounded-2xl bg-white shadow-2xl" onClick={e=>e.stopPropagation()}><div className="flex items-center gap-2 border-b border-zinc-200 px-5 py-3"><Settings2 size={15} className="text-indigo-600"/><h2 className="text-[15px] font-bold">Edit</h2><button onClick={onClose} className="ml-auto p-1 text-zinc-400 hover:bg-zinc-100 rounded-md"><XIcon size={18}/></button></div><div className="space-y-4 p-5"><label className="block"><span className="text-[12px] font-medium text-zinc-600">Brand</span><select value={br} onChange={e=>{sBr(e.target.value);sPd(productsFor(e.target.value)[0]||"");}} className={fld}>{brands.map(b=><option key={b}>{b}</option>)}</select></label><label className="block"><span className="text-[12px] font-medium text-zinc-600">Product</span><select value={pd} onChange={e=>sPd(e.target.value)} className={fld}>{pr.map(p=><option key={p}>{p}</option>)}</select></label><label className="block"><span className="text-[12px] font-medium text-zinc-600">Target Split</span><select value={ts} onChange={e=>sTs(e.target.value)} className={fld}>{TARGET_SPLITS.map(t=><option key={t}>{t}</option>)}</select></label></div><div className="flex justify-end gap-2 border-t border-zinc-200 px-5 py-3"><button onClick={onClose} className="rounded-lg border border-zinc-200 px-4 py-1.5 text-[13px] font-medium text-zinc-600">Cancel</button><button onClick={()=>onSave({brand:br,product:pd,targetSplit:ts})} className="rounded-lg bg-indigo-600 px-4 py-1.5 text-[13px] font-medium text-white">Save</button></div></div></div>;}

/* === Campaign Form (FIX: reserve scope applied, audience naming, budget ceiling) === */
function CampaignForm({brands,productsFor,onAddProd,onRenameProd,defaultBrand,today,onClose,onCreate}){
  const[br,sBr]=useState(defaultBrand);const pr=productsFor(br);const[pd,sPd]=useState(pr[0]||"");const[addPr,sAddPr]=useState(false);const[np,sNp]=useState("");
  const[renamePr,sRenamePr]=useState(false);const[renameVal,sRenameVal]=useState("");
  const[noAwo,sNoAwo]=useState(false);const[awoCust,sAwoCust]=useState("");
  const[limitB,sLimitB]=useState(0);const[obj,sObj]=useState("Purchase");const[goal,sGoal]=useState("Purchase");const[ts,sTs]=useState("Ad Group Level");const[ct2,sCt]=useState("KOL");
  const[kpiR,sKpiR2]=useState(0);const[cprV,sCprV2]=useState(0);const[lastKF,sLKF]=useState(null);
  const sKpiR=v=>{sKpiR2(v);if(v>0&&limitB>0)sCprV2(Math.round(limitB/v*100)/100);sLKF("k");};
  const sCprV=v=>{sCprV2(v);if(v>0&&limitB>0)sKpiR2(Math.round(limitB/v));sLKF("c");};
  const onLimChange=v=>{sLimitB(v);if(lastKF==="k"&&kpiR>0)sCprV2(Math.round(v/kpiR*100)/100);else if(lastKF==="c"&&cprV>0)sKpiR2(Math.round(v/cprV));};
  const[yr,sYr]=useState(2026);const[mo,sMo]=useState("June");const[moCust,sMoCust]=useState("");
  /* FIX: Reserve with scope + sub-item + lump/perperson */
  const[useRes,sUseRes]=useState(false);const[resVal,sResVal]=useState(0);const[resMode,sResMode]=useState("amount");
  const[resScope,sResScope]=useState("total");const[resScopeItem,sResScopeItem]=useState("");const[resType,sResType]=useState("lumpsum");
  /* Split */
  const[splitEq,sSplitEq]=useState(true);const[customPcts,sCustomPcts]=useState("");
  /* KOL textareas */
  const[kolNames,sKolNames]=useState("");const[kolTiers,sKolTiers]=useState("");const[kolTypes,sKolTypes]=useState("");const[kolExpires,sKolExpires]=useState("");
  /* FIX: Audiences — empty set means no audience */
  const[auds,sAuds]=useState(new Set());const[custAuds,sCustAuds]=useState("");
  const togAud=a=>{const n=new Set(auds);n.has(a)?n.delete(a):n.add(a);sAuds(n);};
  const chBr=b=>{sBr(b);sPd(productsFor(b)[0]||"");};
  const addProd=()=>{const n=np.trim();if(!n)return;onAddProd(br,n);sPd(n);sNp("");sAddPr(false);};
  const doRename=()=>{const v=renameVal.trim();if(!v||v===pd)return;onRenameProd(br,pd,v);sPd(v);sRenamePr(false);};

  const names=kolNames.split("\n").map(s=>s.trim()).filter(Boolean);
  const tiers=kolTiers.split("\n").map(s=>s.trim());const types=kolTypes.split("\n").map(s=>s.trim());const expires=kolExpires.split("\n").map(s=>s.trim());
  const entries=names.map((name,i)=>({name,tier:tiers[i]||"-",type:types[i]||"-",expireCode:expires[i]||""}));

  /* FIX: If no audience selected → allAuds = [""] (single group, no name) */
  const allAuds=useMemo(()=>{
    const a=[...auds];
    if(custAuds.trim())custAuds.split("\n").flatMap(l=>l.split(",")).map(s=>s.trim()).filter(Boolean).forEach(s=>{if(!a.includes(s))a.push(s);});
    return a.length>0?a:[""];/* empty string = no audience */
  },[auds,custAuds]);
  const hasAudience=allAuds.length>1||allAuds[0]!=="";

  const totalRows=entries.length*allAuds.length;
  const resTotal=!useRes?0:resMode==="percent"?(Number(limitB)||0)*(Number(resVal)||0)/100:Number(resVal)||0;

  /* FIX: Budget per KOL when no audience + unchecked split */
  const allocatable=Math.max(0,(Number(limitB)||0)-resTotal);

  /* FIX: Reserve scope application */
  const calcReserveForRow=(entry,aud)=>{
    if(!useRes||resTotal<=0)return 0;
    if(resScope==="total")return 0;/* total reserve is at campaign level */
    const matchesTier=resScope==="tier"&&entry.tier===resScopeItem;
    const matchesType=resScope==="type"&&entry.type===resScopeItem;
    const matchesAud=resScope==="audience"&&aud===resScopeItem;
    if(!matchesTier&&!matchesType&&!matchesAud)return 0;
    if(resType==="perperson")return Number(resVal)||0;
    /* lumpsum: count matching rows, divide */
    let matchCount=0;
    for(const a of allAuds)for(const e of entries){
      if(resScope==="tier"&&e.tier===resScopeItem)matchCount++;
      else if(resScope==="type"&&e.type===resScopeItem)matchCount++;
      else if(resScope==="audience"&&a===resScopeItem)matchCount++;
    }
    return matchCount>0?Math.round(resTotal/matchCount):0;
  };

  /* Custom split: amounts per entry (applied per audience) */
  const customAmts=useMemo(()=>{if(splitEq||!customPcts.trim())return null;const p=customPcts.split("\n").map(s=>Number(s.trim()));if(p.length!==entries.length||p.some(isNaN))return null;return p;},[splitEq,customPcts,entries.length]);

  const canSubmit=pd&&entries.length>0&&Number(limitB)>0;
  const genCId=()=>"c"+Date.now().toString(36)+Math.random().toString(36).slice(2,6);

  const submit=()=>{
    if(!canSubmit)return;
    let rowMonth,start,end;
    if(mo==="Custom"){rowMonth=moCust.trim();start="";end="";}
    else{const mi=MONTHS.indexOf(mo);const last=new Date(yr,mi+1,0).getDate();rowMonth=mo;start=`${yr}-${pad(mi+1)}-01`;end=`${yr}-${pad(mi+1)}-${pad(last)}`;}
    const cid=genCId();const nr=[];

    for(const aud of allAuds){
      entries.forEach((e,i)=>{
        let budget;
        if(!splitEq&&!hasAudience){
          /* No audience + unchecked: custom amount IS the per-KOL budget */
          budget=customAmts?customAmts[i]:0;
        }else if(!splitEq&&hasAudience){
          /* Audience + unchecked: custom amount IS the per-audience-group budget, split among KOLs */
          const audIdx=allAuds.indexOf(aud);
          const audBudget=customAmts&&customAmts[audIdx]?customAmts[audIdx]:0;
          budget=entries.length>0?Math.round(audBudget/entries.length):0;
        }else{
          /* Split equally: allocatable / totalRows */
          budget=totalRows>0?Math.round(allocatable/totalRows):0;
        }
        const rowReserve=calcReserveForRow(e,aud);
        nr.push(mkS({
          campaignId:cid,brand:br,product:pd,noAwo,awoCustom:awoCust.trim(),
          contentKol:e.name,kolTier:ct2==="Brand"?"-":(e.tier||"-"),kolType:ct2==="Brand"?"-":(e.type||"-"),
          adPlatform:"TikTok",creatorType:ct2,targetSplit:ts,
          audience:aud,hasAudience,
          month:rowMonth,mediaObjective:obj,optimizationGoal:goal,
          expireCode:e.expireCode||"",expiredDate:parseFlexDate(e.expireCode)||"",
          startDate:start,endDate:end,
          contentBudget:Math.max(0,budget-rowReserve),
          /* FIX: budgetLimit = campaign total, NOT multiplied per row */
          budgetLimit:Number(limitB)||0,
          reserveBudget:Math.round(resTotal),
          equalSplit:splitEq,totalCampaignBudget:Number(limitB)||0,reserveTotal:resTotal,
          kpiTarget:Number(kpiR)||0,cpr:Number(cprV)||0,actual:null
        }));
      });
    }
    /* FIX: Validate total budget doesn't exceed limit */
    const totalBudgetGenerated=nr.reduce((s,r)=>s+(Number(r.contentBudget)||0),0);
    if(totalBudgetGenerated+resTotal>Number(limitB)*1.01){
      alert(`Warning: Total generated budget (${f0(totalBudgetGenerated)}) + reserve (${f0(resTotal)}) exceeds limit (${f0(limitB)}).`);
    }
    onCreate(nr,{brand:br,product:pd});
  };

  /* Scope sub-items */
  const scopeItems=resScope==="tier"?[...new Set(entries.map(e=>e.tier).filter(t=>t&&t!=="-"))]:resScope==="type"?[...new Set(entries.map(e=>e.type).filter(t=>t&&t!=="-"))]:resScope==="audience"?allAuds.filter(a=>a):[];

  const fld="mt-1 w-full rounded-lg border border-zinc-200 px-3 py-2 text-[14px] outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100";
  return<div className="fixed inset-0 z-50 flex items-end justify-center bg-zinc-900/40 backdrop-blur-sm sm:items-center sm:p-4" onClick={onClose}><div className="max-h-[92vh] w-full max-w-2xl overflow-y-auto rounded-t-2xl bg-white shadow-2xl sm:rounded-2xl" onClick={e=>e.stopPropagation()}>
    <div className="sticky top-0 flex items-center gap-2 border-b border-zinc-200 bg-white px-5 py-3 z-10"><Plus size={15} className="text-indigo-600"/><h2 className="text-[15px] font-bold">New campaign</h2><button onClick={onClose} className="ml-auto p-1 text-zinc-400 hover:bg-zinc-100 rounded-md"><XIcon size={18}/></button></div>
    <div className="space-y-4 p-5">
      <div className="grid grid-cols-2 gap-3">
        <label className="block"><span className="text-[12px] font-medium text-zinc-600">Brand</span><select value={br} onChange={e=>chBr(e.target.value)} className={fld}>{brands.map(b=><option key={b}>{b}</option>)}</select></label>
        <label className="block"><span className="text-[12px] font-medium text-zinc-600">Product</span><div className="mt-1 flex gap-1"><select value={pd} onChange={e=>sPd(e.target.value)} className="flex-1 rounded-lg border border-zinc-200 px-3 py-2 text-[14px] outline-none">{pr.length===0&&<option value="">Add →</option>}{pr.map(p=><option key={p}>{p}</option>)}</select><button onClick={()=>sAddPr(v=>!v)} className="grid h-9 w-9 shrink-0 place-items-center rounded-lg border border-zinc-200 text-indigo-600 hover:bg-indigo-50"><Plus size={14}/></button><button onClick={()=>{sRenamePr(v=>!v);sRenameVal(pd);}} className="grid h-9 w-9 shrink-0 place-items-center rounded-lg border border-zinc-200 text-amber-600 hover:bg-amber-50"><Pencil size={14}/></button></div>
        {addPr&&<div className="mt-1.5 flex gap-1.5"><input autoFocus value={np} onChange={e=>sNp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addProd()} placeholder="New product" className="w-full rounded-lg border border-indigo-200 px-2.5 py-1.5 text-[13px] outline-none"/><button onClick={addProd} className="rounded-lg bg-indigo-600 px-3 text-[13px] font-medium text-white">Add</button></div>}
        {renamePr&&<div className="mt-1.5 flex gap-1.5"><input autoFocus value={renameVal} onChange={e=>sRenameVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doRename()} className="w-full rounded-lg border border-amber-200 px-2.5 py-1.5 text-[13px] outline-none"/><button onClick={doRename} className="rounded-lg bg-amber-600 px-3 text-[13px] font-medium text-white">Rename</button></div>}
        </label>
      </div>
      <div className="rounded-lg border border-zinc-200 p-3"><label className="flex items-center gap-2 text-[13px] font-medium text-zinc-700"><input type="checkbox" checked={noAwo} onChange={e=>sNoAwo(e.target.checked)} className="h-4 w-4 accent-indigo-600"/> No AWO</label>{noAwo?<input value={awoCust} onChange={e=>sAwoCust(e.target.value)} placeholder="adhoc" className="mt-2 w-full rounded-lg border border-zinc-200 px-3 py-1.5 text-[13px] outline-none"/>:<p className="mt-1 text-[11px] text-zinc-400">Default: AWO</p>}</div>
      <div className="grid grid-cols-2 gap-3">
        <label className="block"><span className="text-[12px] font-medium text-zinc-600">Limit Budget (฿)</span><input type="number" value={limitB||""} onChange={e=>onLimChange(Number(e.target.value))} className={`${fld} tabular-nums`}/></label>
        <label className="block"><span className="text-[12px] font-medium text-zinc-600">Media Objective</span><select value={obj} onChange={e=>sObj(e.target.value)} className={fld}>{MEDIA_OBJ.map(o=><option key={o}>{o}</option>)}</select></label>
        <label className="block"><span className="text-[12px] font-medium text-zinc-600">Optimization Goal</span><select value={goal} onChange={e=>sGoal(e.target.value)} className={fld}>{OPT_GOALS.map(o=><option key={o}>{o}</option>)}</select></label>
        <label className="block"><span className="text-[12px] font-medium text-zinc-600">Target Split</span><select value={ts} onChange={e=>sTs(e.target.value)} className={fld}>{TARGET_SPLITS.map(t=><option key={t}>{t}</option>)}</select></label>
        <label className="block"><span className="text-[12px] font-medium text-zinc-600">Target KPI result</span><input type="number" value={kpiR||""} onChange={e=>sKpiR(Number(e.target.value))} className={`${fld} tabular-nums`}/></label>
        <label className="block"><span className="text-[12px] font-medium text-zinc-600">Cost per Result</span><input type="number" step="0.01" value={cprV||""} onChange={e=>sCprV(Number(e.target.value))} className={`${fld} tabular-nums`}/></label>
      </div>
      <div className="flex items-center gap-2"><span className="text-[12px] font-medium text-zinc-600">Creator:</span><div className="inline-flex rounded-lg border border-zinc-200 p-0.5 text-[13px]"><button onClick={()=>sCt("KOL")} className={`rounded-md px-3 py-1 font-medium ${ct2==="KOL"?"bg-indigo-600 text-white":"text-zinc-500"}`}>KOL</button><button onClick={()=>sCt("Brand")} className={`rounded-md px-3 py-1 font-medium ${ct2==="Brand"?"bg-indigo-600 text-white":"text-zinc-500"}`}>Brand</button></div></div>

      <div className="rounded-lg border border-zinc-200 p-3 space-y-2">
        <span className="text-[12px] font-semibold text-zinc-700">{ct2==="KOL"?"KOL":"Content"} Entries <span className="font-normal text-zinc-400">— one per line</span></span>
        <div className={`grid gap-2 ${ct2==="KOL"?"grid-cols-4":"grid-cols-2"}`}>
          <div><label className="text-[10px] font-semibold text-zinc-500 uppercase">Names</label><textarea value={kolNames} onChange={e=>sKolNames(e.target.value)} rows={5} placeholder={"MaiReviews\nBeautyByNin"} className="w-full rounded-lg border border-zinc-200 px-2.5 py-2 font-mono text-[12px] outline-none resize-y"/></div>
          {ct2==="KOL"&&<><div><label className="text-[10px] font-semibold text-zinc-500 uppercase">Tier</label><textarea value={kolTiers} onChange={e=>sKolTiers(e.target.value)} rows={5} placeholder={"Macro\nMicro"} className="w-full rounded-lg border border-zinc-200 px-2.5 py-2 font-mono text-[12px] outline-none resize-y"/></div><div><label className="text-[10px] font-semibold text-zinc-500 uppercase">Type</label><textarea value={kolTypes} onChange={e=>sKolTypes(e.target.value)} rows={5} placeholder={"Review\nTutorial"} className="w-full rounded-lg border border-zinc-200 px-2.5 py-2 font-mono text-[12px] outline-none resize-y"/></div></>}
          <div><label className="text-[10px] font-semibold text-zinc-500 uppercase">Expire</label><textarea value={kolExpires} onChange={e=>sKolExpires(e.target.value)} rows={5} placeholder={"12 Jul\nCODE-B"} className="w-full rounded-lg border border-zinc-200 px-2.5 py-2 font-mono text-[12px] outline-none resize-y"/></div>
        </div>
        <p className="text-[11px] text-zinc-400">{entries.length} entries</p>
      </div>

      {/* Audiences — FIX: empty = no audience, no naming */}
      <div className="rounded-lg border border-zinc-200 p-3 space-y-2">
        <span className="text-[12px] font-semibold text-zinc-700">Audiences <span className="font-normal text-zinc-400">(leave empty for no audience split)</span></span>
        <div className="flex flex-wrap gap-2">{AUDIENCE_OPTS.map(a=><label key={a} className={`flex items-center gap-1.5 rounded-full border px-3 py-1 text-[12px] font-medium cursor-pointer ${auds.has(a)?"border-indigo-200 bg-indigo-50 text-indigo-700":"border-zinc-200 text-zinc-500"}`}><input type="checkbox" checked={auds.has(a)} onChange={()=>togAud(a)} className="h-3.5 w-3.5 accent-indigo-600"/>{a}</label>)}</div>
        <textarea value={custAuds} onChange={e=>sCustAuds(e.target.value)} rows={2} placeholder="Custom audiences (one per line)" className="w-full rounded-lg border border-zinc-200 px-2.5 py-1.5 font-mono text-[12px] outline-none resize-y"/>
        <p className="text-[11px] text-zinc-400">{hasAudience?`${allAuds.length} audiences × ${entries.length} = ${totalRows} rows`:`No audience → ${entries.length} rows (audience omitted from naming)`}</p>
      </div>

      <div className="grid grid-cols-2 gap-3"><label className="block"><span className="text-[12px] font-medium text-zinc-600">Year</span><select value={yr} onChange={e=>sYr(Number(e.target.value))} className={fld}>{YEARS.map(y=><option key={y}>{y}</option>)}</select></label><label className="block"><span className="text-[12px] font-medium text-zinc-600">Month</span><select value={mo} onChange={e=>sMo(e.target.value)} className={fld}>{[...MONTHS,"Custom"].map(m=><option key={m}>{m}</option>)}</select></label></div>
      {mo==="Custom"&&<input value={moCust} onChange={e=>sMoCust(e.target.value)} placeholder="Q2-Q3" className={fld}/>}

      {/* FIX: Reserve with scope sub-dropdown + lump/perperson */}
      <div className="rounded-lg border border-zinc-200 p-3 space-y-2">
        <label className="flex items-center gap-2 text-[13px] font-medium text-zinc-700"><input type="checkbox" checked={useRes} onChange={e=>sUseRes(e.target.checked)} className="h-4 w-4 accent-indigo-600"/> Reserve budget</label>
        {useRes&&<>
          <div className="flex flex-wrap items-center gap-2"><input type="number" value={resVal||""} onChange={e=>sResVal(Number(e.target.value))} className="w-28 rounded-lg border border-zinc-200 px-2.5 py-1.5 text-[13px] tabular-nums outline-none"/>
          <div className="inline-flex rounded-lg border border-zinc-200 p-0.5 text-[12px]"><button onClick={()=>sResMode("amount")} className={`rounded-md px-2.5 py-1 font-medium ${resMode==="amount"?"bg-indigo-600 text-white":"text-zinc-500"}`}>฿</button><button onClick={()=>sResMode("percent")} className={`rounded-md px-2.5 py-1 font-medium ${resMode==="percent"?"bg-indigo-600 text-white":"text-zinc-500"}`}>%</button></div>
          <span className="text-[12px] text-zinc-400">= {fmt(resTotal)}</span></div>
          <div className="flex items-center gap-2 text-[12px]"><span className="text-zinc-500">Scope:</span>{["total","audience","tier","type"].map(s=><button key={s} onClick={()=>{sResScope(s);sResScopeItem("");}} className={`rounded-full px-2.5 py-0.5 text-[11px] font-medium ${resScope===s?"bg-indigo-100 text-indigo-700":"bg-zinc-100 text-zinc-500"}`}>{s}</button>)}</div>
          {resScope!=="total"&&scopeItems.length>0&&<div className="flex items-center gap-2"><span className="text-[11px] text-zinc-500">Apply to:</span><select value={resScopeItem} onChange={e=>sResScopeItem(e.target.value)} className="rounded-lg border border-zinc-200 px-2 py-1 text-[12px] outline-none"><option value="">Select…</option>{scopeItems.map(s=><option key={s}>{s}</option>)}</select></div>}
          <div className="flex items-center gap-2"><span className="text-[11px] text-zinc-500">Type:</span>
            <label className={`flex items-center gap-1 rounded-full border px-2.5 py-0.5 text-[11px] font-medium cursor-pointer ${resType==="lumpsum"?"border-indigo-200 bg-indigo-50 text-indigo-700":"border-zinc-200 text-zinc-500"}`}><input type="radio" name="resType" checked={resType==="lumpsum"} onChange={()=>sResType("lumpsum")} className="h-3 w-3 accent-indigo-600"/>Lump Sum (ก้อนรวม)</label>
            <label className={`flex items-center gap-1 rounded-full border px-2.5 py-0.5 text-[11px] font-medium cursor-pointer ${resType==="perperson"?"border-indigo-200 bg-indigo-50 text-indigo-700":"border-zinc-200 text-zinc-500"}`}><input type="radio" name="resType" checked={resType==="perperson"} onChange={()=>sResType("perperson")} className="h-3 w-3 accent-indigo-600"/>Deduct Per Person (หักต่อคน)</label>
          </div>
        </>}
      </div>

      {/* FIX: Split logic depends on audience selection */}
      <div className="rounded-lg border border-zinc-200 p-3 space-y-2">
        <label className="flex items-center gap-2 text-[13px] font-medium text-zinc-700"><input type="checkbox" checked={splitEq} onChange={e=>sSplitEq(e.target.checked)} className="h-4 w-4 accent-indigo-600"/> Split equally?</label>
        {splitEq&&totalRows>0&&limitB>0&&<div className="flex items-center gap-2 rounded-md bg-indigo-50 px-3 py-2 text-[12px] text-indigo-700"><Wand2 size={14}/><span className="tabular-nums">{fmt(allocatable)} ÷ {totalRows} = <b>{fmt(Math.round(allocatable/totalRows))}</b>/row</span></div>}
        {!splitEq&&<div>
          <label className="text-[10px] font-semibold text-zinc-500 uppercase">{hasAudience?"Budget per audience group (one amount per audience line)":"Budget per KOL (one amount per KOL line)"}</label>
          <textarea value={customPcts} onChange={e=>sCustomPcts(e.target.value)} rows={3} placeholder={hasAudience?allAuds.map(a=>`${a||"group"}: amount`).join("\n"):entries.map(e=>`${e.name}: amount`).join("\n")} className="w-full rounded-lg border border-zinc-200 px-2.5 py-1.5 font-mono text-[12px] outline-none resize-y"/>
          <p className="mt-1 text-[10px] text-zinc-400">{hasAudience?`Enter ${allAuds.length} amounts (one per audience). Each splits among ${entries.length} KOLs.`:`Enter ${entries.length} amounts (one per KOL).`}</p>
        </div>}
      </div>
    </div>
    <div className="sticky bottom-0 flex items-center justify-between border-t border-zinc-200 bg-white px-5 py-3 z-10"><span className="text-[11px] text-zinc-400">{totalRows} row{totalRows!==1?"s":""} · Limit: {fmt(limitB)} · Reserve: {fmt(resTotal)}</span><div className="flex gap-2"><button onClick={onClose} className="rounded-lg border border-zinc-200 px-4 py-1.5 text-[13px] font-medium text-zinc-600">Cancel</button><button onClick={submit} disabled={!canSubmit} className="rounded-lg bg-indigo-600 px-4 py-1.5 text-[13px] font-medium text-white disabled:opacity-40">Create</button></div></div>
  </div></div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
