function metrics(r,today){const s=parseD(r.startDate),e=parseD(r.endDate),exp=parseD(r.expiredDate);const totalDays=s&&e?Math.max(1,diffD(e,s)+1):1;let daysRun=0,runLabel="";if(!s){runLabel="No start";}else if(today<s){runLabel="No start";}else if(e&&today>e){daysRun=totalDays;runLabel=String(totalDays);}else{daysRun=diffD(today,s)+1;runLabel=String(daysRun);}const daysRemaining=e?(today>e?0:Math.max(0,diffD(e,today))):0;const dailyBudget=(Number(r.contentBudget)||0)/totalDays;const spent=dailyBudget*daysRun;const daysToExpire=exp?diffD(exp,today):null;const expired=daysToExpire!=null&&daysToExpire<0;const expiringSoon=daysToExpire!=null&&daysToExpire>=0&&daysToExpire<=3;let status;if(!r.contentKol||!r.startDate)status="Waiting";else if(s&&today<s)status="New";else if(e&&today>e)status="Complete";else status="Active";const target=Number(r.kpiTarget)||0,actual=r.actual==null?null:Number(r.actual);let perf=null;if(actual!=null&&target>0){const att=actual/target,tf=totalDays>0?daysRun/totalDays:0,pi=tf>0?att/tf:att>=1?2:0;perf={attain:att,paceIndex:pi};}return{totalDays,daysRun,runLabel,daysRemaining,dailyBudget,spent,daysToExpire,expired,expiringSoon,status,perf};}
function campaignPace(rs){let tgt=0,act=0,run=0,tot=0,has=false;for(const r of rs){tgt+=Number(r.kpiTarget)||0;if(r.actual!=null){act+=Number(r.actual);has=true;}run+=r.m.daysRun;tot+=r.m.totalDays;}if(!has||tgt<=0)return null;const att=act/tgt,tf=tot>0?run/tot:0,pi=tf>0?att/tf:att>=1?2:0;const tone=pi>=1?"good":pi>=.8?"warn":"bad";return{attain:att,paceIndex:pi,label:tone==="good"?"On Track":tone==="warn"?"At Risk":"Behind",tone};}
function aggStatus(rs){if(rs.some(r=>r.m.status==="Active"))return"Active";if(rs.some(r=>r.m.status==="New"))return"New";if(rs.every(r=>r.m.status==="Complete"))return"Complete";return"Waiting";}
function aggDates(rs){let mn=null,mx=null;for(const r of rs){const s=parseD(r.startDate),e=parseD(r.endDate);if(s&&(!mn||s<mn))mn=s;if(e&&(!mx||e>mx))mx=e;}return{start:mn,end:mx};}

function Inp({value,onChange,type="text",className="",placeholder}){return<input type={type} placeholder={placeholder} value={value??""}onChange={e=>onChange(type==="number"?Number(e.target.value):e.target.value)}className={`${ED} ${className}`}/>;}

function BadgeSel({value,onChange,options,bc}){return<select value={value}onChange={e=>onChange(e.target.value)}className={`cursor-pointer rounded-full px-2 py-0.5 text-[11px] font-semibold outline-none ring-1 focus:ring-2 focus:ring-indigo-300 ${bc}`}>{options.map(o=><option key={o} value={o} className="bg-white text-zinc-700">{o}</option>)}</select>;}
function DateCell({value,onChange}){const[e,se]=useState(false);if(e||!value)return<input type="date" autoFocus={e} value={value??""}onChange={ev=>onChange(ev.target.value)}onBlur={()=>se(false)}className={ED}/>;return<button onClick={()=>se(true)}className="w-full rounded-md px-1.5 py-1 text-left text-[12px] text-current hover:bg-white">{fmtDate(value)}</button>;}
const CL="bg-indigo-50/40";

/* ================================================================ */
/*  Main App                                                         */
/* ================================================================ */
function App(){
  const[rows,setRows]=useState([]);
  const[loading,setLoading]=useState(true);
  const[brandList,setBrandList]=useState(["Lolane Natura","Lolane Pro"]);
  const[extraProducts,setExtraProducts]=useState([]);
  const[today,setToday]=useState("2026-06-22");
  const[brand,setBrand]=useState("Lolane Natura");
  const[view,setView]=useState("monthly");
  const[sub,setSub]=useState("All");
  const[query,setQuery]=useState("");
  const[sort,setSort]=useState({key:null,dir:1});
  const[imported,setImported]=useState(false);
  const[importDate,setImportDate]=useState(null);
  const[showForm,setShowForm]=useState(false);
  const[editRow,setEditRow]=useState(null);
  const[addingBrand,setAddingBrand]=useState(false);
  const[newBrand,setNewBrand]=useState("");
  const[collapsed,setCollapsed]=useState(new Set());

  /* ---- Firestore real-time sync ---- */
  useEffect(()=>{
    let unsub;
    const init=async()=>{
      try{
        const snap=await db.collection(COL).get();
        if(snap.empty){
          const batch=db.batch();
          seed.forEach(row=>{const ref=db.collection(COL).doc();batch.set(ref,sanitize(row));});
          await batch.commit();
          console.log("Seeded Firestore with",seed.length,"rows");
        }
        unsub=db.collection(COL).onSnapshot(snapshot=>{
          const data=snapshot.docs.map(doc=>fromDoc(doc));
          setRows(data);
          setLoading(false);
        },err=>{console.error("Firestore listener error:",err);setLoading(false);});
      }catch(err){console.error("Firestore init error:",err);setLoading(false);}
    };
    init();
    return()=>{if(unsub)unsub();};
  },[]);

  const todayD=parseD(today);

  /* ---- Firestore mutations ---- */
  const upd=(id,patch)=>{
    setRows(rs=>rs.map(r=>r.id===id?{...r,...patch}:r));
    db.collection(COL).doc(id).update(sanitize(patch)).catch(e=>console.error("upd err:",e));
  };

  const del=async(id)=>{
    const target=rows.find(r=>r.id===id);if(!target)return;
    const batch=db.batch();
    batch.delete(db.collection(COL).doc(id));
    if(target.equalSplit&&target.campaignId){
      const sibs=rows.filter(r=>r.id!==id&&r.campaignId===target.campaignId);
      if(sibs.length>0){const per=Math.round((target.totalCampaignBudget-target.reserveTotal)/sibs.length),rp=Math.round(target.reserveTotal/sibs.length);sibs.forEach(r=>batch.update(db.collection(COL).doc(r.id),{contentBudget:per,reserveBudget:rp,budgetLimit:Math.round(per*1.1)}));}
    }
    await batch.commit();
  };

  const importPerf=async()=>{
    const batch=db.batch();let any=false;
    rows.forEach(r=>{const m=metrics(r,todayD);if(r.actual!=null||m.status==="Waiting"||m.status==="New")return;const f=Math.min(1,m.daysRun/m.totalDays);const actual=Math.round((Number(r.kpiTarget)||0)*f*(.45+Math.random()*.9));batch.update(db.collection(COL).doc(r.id),{actual});any=true;});
    if(any)await batch.commit();
    setImported(true);setImportDate(today);
  };

  const addRows=async(newRows,added)=>{
    if(added&&!productsFor(added.brand).includes(added.product))setExtraProducts(p=>[...p,added]);
    const batch=db.batch();
    newRows.forEach(row=>{const ref=db.collection(COL).doc();batch.set(ref,sanitize(row));});
    await batch.commit();
    setShowForm(false);
  };

  const tog=k=>setCollapsed(s=>{const n=new Set(s);n.has(k)?n.delete(k):n.add(k);return n;});

  const allBrands=useMemo(()=>Array.from(new Set([...brandList,...rows.map(r=>r.brand)])),[brandList,rows]);
  const brands=useMemo(()=>["All Brands",...allBrands],[allBrands]);
  const productsFor=b=>{const fr=rows.filter(r=>r.brand===b).map(r=>r.product);const fe=extraProducts.filter(p=>p.brand===b).map(p=>p.product);return Array.from(new Set([...fr,...fe])).filter(Boolean);};
  const onAddProd=(b,n)=>setExtraProducts(p=>[...p,{brand:b,product:n}]);
  const confirmBrand=()=>{const n=newBrand.trim();if(!n||allBrands.includes(n)){setAddingBrand(false);setNewBrand("");return;}setBrandList(b=>[...b,n]);setBrand(n);setSub("All");setNewBrand("");setAddingBrand(false);};

  const brandRows=useMemo(()=>rows.filter(r=>brand==="All Brands"||r.brand===brand),[rows,brand]);
  const subTabs=useMemo(()=>{const dim=view==="monthly"?"month":"product";const vals=Array.from(new Set(brandRows.map(r=>r[dim]||"—")));if(view==="monthly")vals.sort((a,b)=>(MONTHS.indexOf(a)-MONTHS.indexOf(b))||a.localeCompare(b));else vals.sort();return["All",...vals];},[brandRows,view]);
  const effSub=subTabs.includes(sub)?sub:"All";
  const filtered=useMemo(()=>{const dim=view==="monthly"?"month":"product";let o=brandRows.filter(r=>effSub==="All"||(r[dim]||"—")===effSub);if(query.trim()){const q=query.toLowerCase();o=o.filter(r=>[r.brand,r.product,r.contentKol,r.adPlatform,campCore(r),genCampaign(r)].join(" ").toLowerCase().includes(q));}return o.map(r=>({...r,m:metrics(r,todayD)}));},[brandRows,view,effSub,query,today]);
  const nested=useMemo(()=>{const ok=view==="monthly"?"product":"month";const om=new Map();for(const r of filtered){const k=r[ok]||"—";if(!om.has(k))om.set(k,new Map());const cm=om.get(k);const ck=genCampaign(r);if(!cm.has(ck))cm.set(ck,[]);cm.get(ck).push(r);}let outers=Array.from(om.entries());if(view==="monthly")outers.sort((a,b)=>a[0].localeCompare(b[0]));else outers.sort((a,b)=>(MONTHS.indexOf(a[0])-MONTHS.indexOf(b[0]))||a[0].localeCompare(b[0]));return outers.map(([k,cm])=>[k,Array.from(cm.entries()).sort((a,b)=>a[0].localeCompare(b[0]))]);},[filtered,view]);
  const totals=useMemo(()=>{const t={adm:0,spent:0,limit:0,reserve:0,active:0,alerts:0};for(const r of filtered){t.adm+=Number(r.contentBudget)||0;t.spent+=r.m.spent||0;t.limit+=Number(r.budgetLimit)||0;t.reserve+=Number(r.reserveBudget)||0;if(r.m.status==="Active")t.active++;if(r.m.expired||r.m.expiringSoon)t.alerts++;}return t;},[filtered]);
  const insights=useMemo(()=>{if(!imported)return[];const live=filtered.filter(r=>r.m.perf&&r.m.status!=="Waiting");const donors=live.filter(r=>r.m.perf.paceIndex>=1.15).sort((a,b)=>b.m.perf.attain-a.m.perf.attain);const needers=live.filter(r=>r.m.perf.paceIndex<.85&&r.m.status==="Active").sort((a,b)=>a.m.perf.paceIndex-b.m.perf.paceIndex);const out=[];for(let i=0;i<Math.min(donors.length,needers.length);i++){const d=donors[i],r=needers[i];const sh=Math.round(Math.min(Math.max(0,Number(d.reserveBudget)||0),(Number(r.contentBudget)||0)*.2)/1e3)*1e3;if(sh<=0)continue;out.push({tone:"shift",text:`${d.contentKol} (${d.product}) pacing at ${Math.round(d.m.perf.attain*100)}%. Reallocate ${fmt(sh)} into ${r.contentKol} (${r.product}) — ${Math.round(r.m.perf.attain*100)}% attained.`});}for(const r of filtered.filter(x=>x.m.expiringSoon||x.m.expired))out.push({tone:r.m.expired?"alert":"warn",text:r.m.expired?`Promo ${r.expireCode||r.product} expired ${Math.abs(r.m.daysToExpire)}d ago.`:`Promo ${r.expireCode||r.product} expires in ${r.m.daysToExpire}d.`});if(out.length===0)out.push({tone:"ok",text:"All campaigns pacing within target bands."});return out;},[imported,filtered]);

  const SB=({k,children})=>{const a=sort.key===k;const Ic=!a?ArrowUpDown:sort.dir===1?ArrowUp:ArrowDown;return<button onClick={()=>setSort(s=>({key:k,dir:s.key===k?-s.dir:1}))}className={`inline-flex items-center gap-1 ${a?"text-indigo-600":"text-inherit hover:text-zinc-700"}`}>{children}<Ic size={11}/></button>;};
  const Th=({children,className="",k})=><th className={`whitespace-nowrap px-3 py-2 text-left text-[11px] font-semibold uppercase tracking-wider ${className}`}>{k?<SB k={k}>{children}</SB>:children}</th>;
  const pivotLbl=view==="monthly"?"Product":"Month";
  const StatusCell=({r})=>{if(r.m.status==="New"){const v=r.statusOverride==="Schedule"?"Schedule":"New";return<select value={v}onChange={e=>upd(r.id,{statusOverride:e.target.value==="Schedule"?"Schedule":null})}className={`cursor-pointer rounded-full px-2 py-0.5 text-[11px] font-semibold outline-none ring-1 ${SS[v]}`}><option value="New">New</option><option value="Schedule">Schedule</option></select>;}return<StatusPill status={r.m.status}/>;};
  const ActualCell=({r})=>{if(r.actual==null)return<span className="text-[11px] text-zinc-400 italic">No data</span>;return<div><Inp type="number" value={r.actual} onChange={v=>upd(r.id,{actual:v})} className="text-right"/>{importDate&&<div className="text-[9px] text-zinc-400 text-right">Updated: {fmtDate(importDate)}</div>}</div>;};
  let rowNo=0;const OuterIc=view==="monthly"?Package:CalendarRange;

  const SummaryRow=({rs,level,label,onToggle})=>{const d=aggDates(rs),st=aggStatus(rs),cLim=rs.reduce((s,r)=>s+(Number(r.budgetLimit)||0),0),cRes=rs.reduce((s,r)=>s+(Number(r.reserveBudget)||0),0),cSpent=rs.reduce((s,r)=>s+(r.m.spent||0),0),isCamp=level==="campaign",cActual=isCamp?rs.reduce((s,r)=>s+(r.actual!=null?Number(r.actual):0),0):null,cTarget=isCamp?rs.reduce((s,r)=>s+(Number(r.kpiTarget)||0),0):null,cPace=isCamp?campaignPace(rs):null,bg=level==="outer"?"bg-zinc-100/90":"bg-gradient-to-r from-indigo-50/70 to-white";return(<tr className={`border-b border-zinc-200 ${bg}`}><td className={`px-3 py-2 ${level==="campaign"?"pl-8":""}`}><button onClick={onToggle} className="flex items-center gap-2 text-zinc-700 hover:bg-white rounded-md px-1.5 py-0.5"><ChevronRight size={15}/>{level==="outer"&&<OuterIc size={14} className={view==="monthly"?"text-emerald-500":"text-amber-500"}/>}<span className="text-[13px] font-bold text-zinc-900 truncate max-w-[200px]">{label}</span><span className="text-[11px] text-zinc-400">{rs.length}r</span></button></td><td/><td/><td/><td/><td/><td/><td/><td/><td/><td className={`px-3 py-2 ${CL}`}><StatusPill status={st}/></td><td className="px-2 py-2 text-[12px]">{d.start?fmtDate(d.start.toISOString().slice(0,10)):"—"}</td><td className="px-2 py-2 text-[12px]">{d.end?fmtDate(d.end.toISOString().slice(0,10)):"—"}</td><td/><td/><td/><td className="px-2 py-2 text-right text-[12px] font-semibold tabular-nums">{fmt(cLim)}</td><td className="px-2 py-2 text-right text-[12px] tabular-nums">{fmt(cRes)}</td><td/><td/><td className={`px-2 py-2 text-right text-[12px] font-semibold tabular-nums ${CL}`}>{fmt(cSpent)}</td>{isCamp?<td className="px-2 py-2 text-right text-[12px] tabular-nums">{cActual!=null?fmt(cActual):"—"}</td>:<td/>}{isCamp?<td className="px-2 py-2 text-right text-[12px] tabular-nums">{cTarget?fmt(cTarget):"—"}</td>:<td/>}{isCamp?<td className={`px-3 py-2 ${CL}`}><PaceBadge perf={cPace} compact/></td>:<td/>}</tr>);};

  if(loading)return<div className="flex items-center justify-center min-h-screen bg-zinc-50"><div className="text-center"><div className="inline-block h-10 w-10 animate-spin rounded-full border-4 border-indigo-200 border-t-indigo-600"/><p className="mt-4 text-[14px] font-medium text-zinc-600">Connecting to Firestore…</p><p className="mt-1 text-[12px] text-zinc-400">my-budget-planner-230669</p></div></div>;

  return(
    <div className="min-h-screen bg-gradient-to-b from-zinc-50 to-white font-sans text-zinc-800">
      <header className="sticky top-0 z-30 border-b border-zinc-200 bg-white/85 backdrop-blur-xl">
        <div className="mx-auto flex max-w-[1700px] flex-wrap items-center gap-3 px-6 py-3">
          <div className="flex items-center gap-2.5"><div className="grid h-8 w-8 place-items-center rounded-lg bg-gradient-to-br from-indigo-500 via-violet-500 to-fuchsia-500 text-white shadow-sm"><Layers size={17}/></div><div><h1 className="bg-gradient-to-r from-indigo-600 to-violet-600 bg-clip-text text-[14px] font-bold leading-tight tracking-tight text-transparent">Media Budget &amp; Performance</h1><p className="text-[11px] text-zinc-400">Plan · Pace · Reallocate <span className="ml-1 inline-flex items-center gap-1 rounded-full bg-emerald-50 px-1.5 py-0.5 text-[9px] font-semibold text-emerald-600 ring-1 ring-emerald-200">● Firestore</span></p></div></div>
          <div className="ml-auto flex flex-wrap items-center gap-2">
            <label className="flex items-center gap-1.5 rounded-lg border border-zinc-200 bg-white px-2.5 py-1.5 text-[13px] shadow-sm"><CalendarDays size={14} className="text-zinc-400"/><input type="date" value={today} onChange={e=>setToday(e.target.value)} className="bg-transparent font-medium outline-none"/></label>
            <button onClick={importPerf} className="flex items-center gap-1.5 rounded-lg border border-zinc-200 bg-white px-3 py-1.5 text-[13px] font-medium shadow-sm hover:bg-zinc-50"><Upload size={14}/> Import performance</button>
            <button onClick={()=>setShowForm(true)} className="flex items-center gap-1.5 rounded-lg bg-gradient-to-r from-indigo-600 to-violet-600 px-3 py-1.5 text-[13px] font-medium text-white shadow-sm hover:opacity-90"><Plus size={14}/> New campaign</button>
          </div>
        </div>
        <div className="mx-auto flex max-w-[1700px] items-center gap-1 overflow-x-auto px-6">
          {brands.map(b=>{const t=b==="All Brands"?null:brandTint(b);return<button key={b} onClick={()=>{setBrand(b);setSub("All");}}className={`relative flex items-center gap-1.5 whitespace-nowrap px-3 py-2.5 text-[13px] font-medium ${brand===b?"text-indigo-600":"text-zinc-500 hover:text-zinc-800"}`}>{t&&<span className={`h-2 w-2 rounded-full ${t.dot}`}/>}{b}{brand===b&&<span className="absolute inset-x-2 -bottom-px h-0.5 rounded-full bg-indigo-600"/>}</button>;})}
          {addingBrand?<div className="flex items-center gap-1 py-1.5"><input autoFocus value={newBrand} onChange={e=>setNewBrand(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")confirmBrand();if(e.key==="Escape"){setAddingBrand(false);setNewBrand("");}}} placeholder="New brand" className="w-36 rounded-md border border-indigo-300 px-2 py-1 text-[13px] outline-none"/><button onClick={confirmBrand} className="grid h-7 w-7 place-items-center rounded-md bg-indigo-600 text-white"><Check size={14}/></button><button onClick={()=>{setAddingBrand(false);setNewBrand("");}} className="grid h-7 w-7 place-items-center rounded-md border border-zinc-200 text-zinc-400"><XIcon size={14}/></button></div>:<button onClick={()=>setAddingBrand(true)} className="ml-1 grid h-7 w-7 shrink-0 place-items-center rounded-md border border-dashed border-zinc-300 text-zinc-400 hover:border-indigo-300 hover:text-indigo-600"><Plus size={15}/></button>}
        </div>
      </header>

      <div className="sticky top-[105px] z-20 border-b border-zinc-200 bg-zinc-50/90 backdrop-blur">
        <div className="mx-auto flex max-w-[1700px] flex-wrap items-center gap-3 px-6 py-3">
          <div className="inline-flex rounded-lg border border-zinc-200 bg-white p-0.5 text-[13px] shadow-sm">
            <button onClick={()=>{setView("monthly");setSub("All");}}className={`flex items-center gap-1.5 rounded-md px-3 py-1 font-medium ${view==="monthly"?"bg-indigo-600 text-white shadow-sm":"text-zinc-600 hover:bg-zinc-50"}`}><CalendarRange size={14}/> Monthly</button>
            <button onClick={()=>{setView("product");setSub("All");}}className={`flex items-center gap-1.5 rounded-md px-3 py-1 font-medium ${view==="product"?"bg-indigo-600 text-white shadow-sm":"text-zinc-600 hover:bg-zinc-50"}`}><LayoutGrid size={14}/> Product</button>
          </div>
          <div className="flex flex-1 flex-wrap items-center gap-1.5">{subTabs.map(t=><button key={t} onClick={()=>setSub(t)} className={`rounded-full border px-3 py-1 text-[12px] font-medium ${effSub===t?"border-indigo-200 bg-indigo-50 text-indigo-700":"border-zinc-200 bg-white text-zinc-500 hover:text-zinc-700"}`}>{t==="All"?"All "+(view==="monthly"?"months":"products"):t}</button>)}</div>
          <label className="flex items-center gap-2 rounded-lg border border-zinc-200 bg-white px-2.5 py-1.5 text-[13px] shadow-sm"><Search size={14} className="text-zinc-400"/><input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Search…" className="w-36 bg-transparent outline-none"/></label>
        </div>
      </div>

      <main className="mx-auto max-w-[1700px] space-y-5 px-6 py-5">
        <section className="grid grid-cols-2 gap-3 sm:grid-cols-3 lg:grid-cols-6">
          <Stat icon={Wallet} label="Budget in Ad manager" value={fmt0(totals.adm)} sub={`${filtered.length} rows`} accent="text-indigo-500" ring="border-indigo-200"/>
          <Stat icon={Gauge} label="Spent" value={fmt0(totals.spent)} sub={`of ${fmt0(totals.limit)} limit`} accent="text-sky-500" ring="border-sky-200"/>
          <Stat icon={Target} label="Budget limit" value={fmt0(totals.limit)} sub="max allowable" accent="text-violet-500" ring="border-violet-200"/>
          <Stat icon={CircleDashed} label="Reserve" value={fmt0(totals.reserve)} sub="held back" accent="text-zinc-400" ring="border-zinc-200"/>
          <Stat icon={Activity} label="Active now" value={totals.active} sub="live campaigns" accent="text-emerald-500" ring="border-emerald-200"/>
          <Stat icon={AlertTriangle} label="Expiry alerts" value={totals.alerts} sub="≤3d / passed" accent={totals.alerts?"text-rose-500":"text-zinc-400"} ring={totals.alerts?"border-rose-300":"border-zinc-200"}/>
        </section>

        <section className="overflow-hidden rounded-xl border border-zinc-200 bg-white shadow-sm">
          <div className="flex items-center gap-2 border-b border-zinc-200 bg-gradient-to-r from-zinc-50 to-white px-4 py-2.5"><Table2 size={14} className="text-indigo-500"/><span className="text-[13px] font-semibold text-zinc-700">{brand}</span><span className="text-[12px] text-zinc-400">· {filtered.length} rows</span><span className="ml-auto flex items-center gap-3 text-[11px] text-zinc-400"><span className="flex items-center gap-1"><span className="inline-block h-2.5 w-3 rounded-sm border border-zinc-300 bg-white"/> input</span><span className="flex items-center gap-1"><span className="inline-block h-2.5 w-3 rounded-sm border border-indigo-200 bg-indigo-50"/> auto</span></span></div>
          {nested.length===0?<div className="p-10 text-center text-[13px] text-zinc-500">No rows yet. Create a campaign to get started.</div>:(
            <div className="overflow-x-auto"><table className="min-w-[2200px] border-collapse text-[12px]"><thead>
              <tr className="text-[10px] font-bold uppercase tracking-wider"><td colSpan={9} className="border-b border-r border-zinc-200 bg-indigo-50 px-3 py-1.5 text-indigo-700">Identity &amp; Metadata</td><td colSpan={7} className="border-b border-r border-zinc-200 bg-amber-50 px-3 py-1.5 text-amber-700">Flighting</td><td colSpan={5} className="border-b border-r border-zinc-200 bg-emerald-50 px-3 py-1.5 text-emerald-700">Financials</td><td colSpan={3} className="border-b border-zinc-200 bg-violet-50 px-3 py-1.5 text-violet-700">Performance</td></tr>
              <tr className="border-b border-zinc-200 bg-white text-zinc-400"><Th k="pivot">{pivotLbl}</Th><Th className={CL}>Campaign</Th><Th>Ad group</Th><Th>Obj.</Th><Th>Goal</Th><Th>Tier</Th><Th>Type</Th><Th k="kol">Content</Th><Th>Platform</Th><Th>Expired</Th><Th className={CL}>Status</Th><Th>Start</Th><Th>End</Th><Th className={`text-right ${CL}`}>Days</Th><Th className={`text-right ${CL}`}>Today</Th><Th className={`text-right ${CL}`}>Rem.</Th><Th className="text-right">Limit ฿</Th><Th className="text-right">Reserved ฿</Th><Th className="text-right" k="budget">Budget ฿</Th><Th className={`text-right ${CL}`}>Daily ฿</Th><Th className={`text-right ${CL}`}>Spent ฿</Th><Th className="text-right">Actual KPI</Th><Th className="text-right">Target KPI</Th><Th className={CL}>Pace</Th></tr>
            </thead><tbody>
              {nested.map(([ok,camps])=>{const oKey="o:"+ok,oC=collapsed.has(oKey),oRows=camps.flatMap(([,rs])=>rs);
                if(oC)return<SummaryRow key={oKey} rs={oRows} level="outer" label={ok} onToggle={()=>tog(oKey)}/>;
                return(<Fragment key={oKey}>
                  <tr className="border-y border-zinc-200 bg-zinc-100/90"><td colSpan={24} className="px-3 py-2"><div className="flex flex-wrap items-center gap-3"><button onClick={()=>tog(oKey)} className="flex items-center gap-2 rounded-md px-1.5 py-0.5 text-zinc-700 hover:bg-white"><ChevronDown size={16}/><OuterIc size={15} className={view==="monthly"?"text-emerald-500":"text-amber-500"}/><span className="text-[13px] font-bold uppercase tracking-wide text-zinc-900">{ok}</span></button><span className="text-[11px] text-zinc-500">{oRows.length} rows</span><div className="ml-auto flex items-center gap-4 text-[11px]"><span className="text-zinc-500">Budget <b className="tabular-nums text-zinc-900">{fmt(oRows.reduce((s,r)=>s+(Number(r.contentBudget)||0),0))}</b></span><span className="text-zinc-500">Spent <b className="tabular-nums text-zinc-900">{fmt(oRows.reduce((s,r)=>s+(r.m.spent||0),0))}</b></span></div></div></td></tr>

                      {rs.map(r=>{const m=r.m,urg=m.expired||m.expiringSoon,rt=urg?"text-rose-600 font-medium":"text-zinc-700";rowNo++;return(
                        <tr key={r.id} className={`border-b border-zinc-100 align-middle hover:bg-indigo-50/20 ${urg?"bg-rose-50/60":""} ${rt}`}>

                          <td className={`px-3 py-2 min-w-[210px] ${CL}`}><div className="text-[12px] font-bold">{campCore(r)}{r.targetSplit==="Campaign Level"&&<span className="ml-1 text-violet-600">({r.audience})</span>}</div><div className="font-mono text-[10px] text-zinc-400">{genCampaign(r)}</div></td>
                          <td className="px-2 py-2 min-w-[140px]"><div className="text-[11px]">{r.audience}</div><div className="font-mono text-[9px] text-zinc-400 truncate max-w-[130px]">{genAdGroup(r)}</div></td>

                          <td className="px-2 py-2 min-w-[110px]"><DateCell value={r.expiredDate} onChange={v=>upd(r.id,{expiredDate:v})}/></td>

                          <td className={`px-3 py-2 text-right tabular-nums ${CL}`}>{m.runLabel}</td>
                          <td className={`px-3 py-2 text-right tabular-nums ${CL}`}>{m.daysRemaining}</td>
                          <td className="px-2 py-2 text-right min-w-[100px]"><Inp type="number" value={r.budgetLimit} onChange={v=>upd(r.id,{budgetLimit:v})} className="text-right"/></td>

                          <td className={`px-3 py-2 text-right tabular-nums ${CL}`}>{fmt(m.dailyBudget)}</td>
                          <td className={`px-3 py-2 text-right tabular-nums font-medium ${CL}`}>{fmt(m.spent)}</td>
                          <td className="px-2 py-2 text-right min-w-[110px]"><ActualCell r={r}/></td>
                          <td className="px-2 py-2 text-right min-w-[100px]"><Inp type="number" value={r.kpiTarget} onChange={v=>upd(r.id,{kpiTarget:v})} className="text-right"/></td>
                          <td className={`px-3 py-2 ${CL}`}><PaceBadge perf={cp} compact/></td>
                        </tr>);})}
                    </Fragment>);})}
                </Fragment>);})}
            </tbody></table></div>
          )}
        </section>

        <section className="overflow-hidden rounded-xl border border-indigo-200 bg-gradient-to-br from-indigo-50 via-violet-50/40 to-white shadow-sm">
          <div className="flex items-center gap-2 border-b border-indigo-100 px-4 py-3"><div className="grid h-7 w-7 place-items-center rounded-md bg-gradient-to-br from-indigo-500 to-violet-600 text-white"><Sparkles size={15}/></div><h3 className="text-[14px] font-bold text-zinc-900">AI Insights</h3>{!imported&&<span className="ml-auto text-[12px] text-zinc-400">Import performance to activate</span>}</div>
          <div className="p-4">{!imported?<div className="flex items-center gap-3 rounded-lg border border-dashed border-indigo-200 bg-white/70 p-4 text-[13px] text-zinc-500"><Wand2 size={18} className="text-indigo-400"/><span>Click <b>Import performance</b> to load actuals and see pace-index recommendations.</span></div>:<ul className="space-y-2.5">{insights.map((ins,i)=>{const tone={shift:{ic:"text-indigo-500",icon:Wand2},warn:{ic:"text-amber-500",icon:AlertTriangle},alert:{ic:"text-rose-500",icon:AlertTriangle},ok:{ic:"text-emerald-500",icon:Trophy}}[ins.tone];const Ic=tone.icon;return<li key={i} className="flex items-start gap-2.5 text-[13px] leading-relaxed text-zinc-700"><Ic size={15} className={`mt-0.5 shrink-0 ${tone.ic}`}/><span>{ins.text}</span></li>;})}</ul>}</div>
        </section>
        <footer className="pb-6 pt-1 text-center text-[11px] text-zinc-400">Data synced in real-time with Firebase Firestore. All changes persist across sessions and devices.</footer>
      </main>

      {showForm&&<CampaignForm brands={allBrands} productsFor={productsFor} onAddProd={onAddProd} defaultBrand={brand==="All Brands"?allBrands[0]:brand} today={today} onClose={()=>setShowForm(false)} onCreate={addRows}/>}
      {editRow&&<EditModal row={editRow} brands={allBrands} productsFor={productsFor} onAddProd={onAddProd} onSave={p=>{upd(editRow.id,p);setEditRow(null);}} onClose={()=>setEditRow(null)}/>}
    </div>
  );
}

/* === Edit Modal === */
function EditModal({row,brands,productsFor,onAddProd,onSave,onClose}){const[brand,setBr]=useState(row.brand);const products=productsFor(brand);const[product,setPr]=useState(row.product);const[ts,setTs]=useState(row.targetSplit||"Ad Group Level");const[adding,setAdding]=useState(false);const[np,setNp]=useState("");const chBr=b=>{setBr(b);setPr(productsFor(b)[0]||"");};const addP=()=>{const n=np.trim();if(!n)return;onAddProd(brand,n);setPr(n);setNp("");setAdding(false);};const fld="mt-1 w-full rounded-lg border border-zinc-200 px-3 py-2 text-[14px] outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100";return(<div className="fixed inset-0 z-50 flex items-center justify-center bg-zinc-900/40 backdrop-blur-sm p-4" onClick={onClose}><div className="w-full max-w-sm overflow-hidden rounded-2xl bg-white shadow-2xl" onClick={e=>e.stopPropagation()}><div className="flex items-center gap-2 border-b border-zinc-200 px-5 py-3"><Settings2 size={15} className="text-indigo-600"/><h2 className="text-[15px] font-bold">Edit metadata</h2><button onClick={onClose} className="ml-auto p-1 text-zinc-400 hover:bg-zinc-100 rounded-md"><XIcon size={18}/></button></div><div className="space-y-4 p-5"><label className="block"><span className="text-[12px] font-medium text-zinc-600">Brand</span><select value={brand} onChange={e=>chBr(e.target.value)} className={fld}>{brands.map(b=><option key={b}>{b}</option>)}</select></label><label className="block"><span className="text-[12px] font-medium text-zinc-600">Product</span><div className="mt-1 flex items-center gap-1.5"><select value={product} onChange={e=>setPr(e.target.value)} className="w-full rounded-lg border border-zinc-200 px-3 py-2 text-[14px] outline-none">{products.map(p=><option key={p}>{p}</option>)}</select><button onClick={()=>setAdding(v=>!v)} className="grid h-9 w-9 shrink-0 place-items-center rounded-lg border border-zinc-200 text-indigo-600 hover:bg-indigo-50"><Plus size={16}/></button></div>{adding&&<div className="mt-1.5 flex gap-1.5"><input autoFocus value={np} onChange={e=>setNp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addP()} placeholder="New product" className="w-full rounded-lg border border-indigo-200 px-2.5 py-1.5 text-[13px] outline-none"/><button onClick={addP} className="rounded-lg bg-indigo-600 px-3 text-[13px] font-medium text-white">Add</button></div>}</label><label className="block"><span className="text-[12px] font-medium text-zinc-600">Target Split</span><select value={ts} onChange={e=>setTs(e.target.value)} className={fld}>{TARGET_SPLITS.map(t=><option key={t}>{t}</option>)}</select></label></div><div className="flex justify-end gap-2 border-t border-zinc-200 px-5 py-3"><button onClick={onClose} className="rounded-lg border border-zinc-200 px-4 py-1.5 text-[13px] font-medium text-zinc-600 hover:bg-zinc-50">Cancel</button><button onClick={()=>onSave({brand,product,targetSplit:ts})} className="rounded-lg bg-indigo-600 px-4 py-1.5 text-[13px] font-medium text-white hover:bg-indigo-700">Save</button></div></div></div>);}

/* === Campaign Form === */
function CampaignForm({brands,productsFor,onAddProd,defaultBrand,today,onClose,onCreate}){
  const[brand,setBr]=useState(defaultBrand);const products=productsFor(brand);const[product,setPr]=useState(products[0]||"");const[addingPr,setAddingPr]=useState(false);const[np,setNp]=useState("");
  const[noAwo,setNoAwo]=useState(false);const[awoCustom,setAwoC]=useState("");const[limitBudget,setLB]=useState(0);const[objective,setObj]=useState("Purchase");const[goal,setGoal]=useState("Purchase");const[targetSplit,setTS]=useState("Ad Group Level");const[creatorType,setCT]=useState("KOL");const[kpiResult,setKR]=useState(0);const[cpr,setCPR]=useState(0);
  const[year,setYear]=useState(2026);const[monthSel,setMS]=useState("June");const[monthCustom,setMC]=useState("");const[useReserve,setUR]=useState(false);const[reserveVal,setRV]=useState(0);const[reserveMode,setRM]=useState("amount");const[splitEqually,setSE]=useState(true);
  const[entries,setEntries]=useState([]);const[pasteText,setPT]=useState("");
  const[audiences,setAud]=useState(new Set(["Prospect"]));const[customAud,setCA]=useState("");
  const chBr=b=>{setBr(b);setPr(productsFor(b)[0]||"");};const confirmPr=()=>{const n=np.trim();if(!n)return;onAddProd(brand,n);setPr(n);setNp("");setAddingPr(false);};
  const parsePaste=()=>{const lines=pasteText.split("\n").map(s=>s.trim()).filter(Boolean);setEntries(prev=>[...prev,...lines.map(n=>({name:n,tier:"Macro",type:"Review",expireCode:""}))]);setPT("");};
  const updEntry=(i,patch)=>setEntries(es=>es.map((e,j)=>j===i?{...e,...patch}:e));const delEntry=i=>setEntries(es=>es.filter((_,j)=>j!==i));
  const toggleAud=a=>{const n=new Set(audiences);n.has(a)?n.delete(a):n.add(a);setAud(n);};
  const allAuds=useMemo(()=>{const a=[...audiences];if(customAud.trim())customAud.split(",").map(s=>s.trim()).filter(Boolean).forEach(s=>{if(!a.includes(s))a.push(s);});return a;},[audiences,customAud]);
  const totalRows=entries.length*Math.max(1,allAuds.length);
  const reserveTotal=!useReserve?0:reserveMode==="percent"?(Number(limitBudget)||0)*(Number(reserveVal)||0)/100:Number(reserveVal)||0;
  const allocatable=Math.max(0,(Number(limitBudget)||0)-reserveTotal);const perRow=totalRows&&splitEqually?Math.round(allocatable/totalRows):0;
  const canSubmit=product&&entries.length>0&&Number(limitBudget)>0&&allAuds.length>0;
  const genCId=()=>"c"+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  const submit=()=>{if(!canSubmit)return;let rowMonth,start,end;if(monthSel==="Custom"){rowMonth=monthCustom.trim();start=today;end=addDaysF(today,30);}else{const mi=MONTHS.indexOf(monthSel);const last=new Date(year,mi+1,0).getDate();rowMonth=monthSel;start=`${year}-${pad(mi+1)}-01`;end=`${year}-${pad(mi+1)}-${pad(last)}`;}const cid=genCId();const resPerRow=totalRows?Math.round(reserveTotal/totalRows):0;const newRows=[];for(const aud of allAuds){for(const e of entries){newRows.push(mkSeed({campaignId:cid,brand,product,noAwo,awoCustom:awoCustom.trim(),contentKol:e.name,kolTier:creatorType==="Brand"?"-":((e.tier==="-"||!e.tier)?"-":e.tier),kolType:creatorType==="Brand"?"-":((e.type==="-"||!e.type)?"-":e.type),adPlatform:"TikTok",creatorType,targetSplit,audience:aud,month:rowMonth,mediaObjective:objective,optimizationGoal:goal,expireCode:e.expireCode||"",expiredDate:end,startDate:start,endDate:end,contentBudget:perRow,budgetLimit:Number(limitBudget)||0,reserveBudget:resPerRow,equalSplit:splitEqually,totalCampaignBudget:Number(limitBudget)||0,reserveTotal,kpiTarget:Number(kpiResult)||0,cpr:Number(cpr)||0,actual:null}));}}onCreate(newRows,{brand,product});};
  const fld="mt-1 w-full rounded-lg border border-zinc-200 px-3 py-2 text-[14px] outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100";
  return(<div className="fixed inset-0 z-50 flex items-end justify-center bg-zinc-900/40 backdrop-blur-sm sm:items-center sm:p-4" onClick={onClose}><div className="max-h-[92vh] w-full max-w-2xl overflow-y-auto rounded-t-2xl bg-white shadow-2xl sm:rounded-2xl" onClick={e=>e.stopPropagation()}>
    <div className="sticky top-0 flex items-center gap-2 border-b border-zinc-200 bg-white px-5 py-3 z-10"><Plus size={15} className="text-indigo-600"/><h2 className="text-[15px] font-bold text-zinc-900">New campaign</h2><button onClick={onClose} className="ml-auto p-1 text-zinc-400 hover:bg-zinc-100 rounded-md"><XIcon size={18}/></button></div>
    <div className="space-y-4 p-5">
      <div className="grid grid-cols-2 gap-3"><label className="block"><span className="text-[12px] font-medium text-zinc-600">Brand</span><select value={brand} onChange={e=>chBr(e.target.value)} className={fld}>{brands.map(b=><option key={b}>{b}</option>)}</select></label><label className="block"><span className="text-[12px] font-medium text-zinc-600">Product</span><div className="mt-1 flex gap-1.5"><select value={product} onChange={e=>setPr(e.target.value)} className="w-full rounded-lg border border-zinc-200 px-3 py-2 text-[14px] outline-none">{products.length===0&&<option value="">Add →</option>}{products.map(p=><option key={p}>{p}</option>)}</select><button onClick={()=>setAddingPr(v=>!v)} className="grid h-9 w-9 shrink-0 place-items-center rounded-lg border border-zinc-200 text-indigo-600 hover:bg-indigo-50"><Plus size={16}/></button></div>{addingPr&&<div className="mt-1.5 flex gap-1.5"><input autoFocus value={np} onChange={e=>setNp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&confirmPr()} placeholder="New product" className="w-full rounded-lg border border-indigo-200 px-2.5 py-1.5 text-[13px] outline-none"/><button onClick={confirmPr} className="rounded-lg bg-indigo-600 px-3 text-[13px] font-medium text-white">Add</button></div>}</label></div>
      <div className="rounded-lg border border-zinc-200 p-3"><label className="flex items-center gap-2 text-[13px] font-medium text-zinc-700"><input type="checkbox" checked={noAwo} onChange={e=>setNoAwo(e.target.checked)} className="h-4 w-4 rounded accent-indigo-600"/> No AWO</label>{noAwo?<input value={awoCustom} onChange={e=>setAwoC(e.target.value)} placeholder="e.g. adhoc" className="mt-2 w-full rounded-lg border border-zinc-200 px-3 py-1.5 text-[13px] outline-none"/>:<p className="mt-1 text-[11px] text-zinc-400">Default: AWO</p>}</div>
      <div className="grid grid-cols-2 gap-3"><label className="block"><span className="text-[12px] font-medium text-zinc-600">Limit Budget (฿)</span><input type="number" value={limitBudget||""} onChange={e=>setLB(Number(e.target.value))} className={`${fld} tabular-nums`}/></label><label className="block"><span className="text-[12px] font-medium text-zinc-600">Media Objective</span><select value={objective} onChange={e=>setObj(e.target.value)} className={fld}>{MEDIA_OBJECTIVES.map(o=><option key={o}>{o}</option>)}</select></label><label className="block"><span className="text-[12px] font-medium text-zinc-600">Optimization Goal</span><select value={goal} onChange={e=>setGoal(e.target.value)} className={fld}>{OPT_GOALS.map(o=><option key={o}>{o}</option>)}</select></label><label className="block"><span className="text-[12px] font-medium text-zinc-600">Target Split</span><select value={targetSplit} onChange={e=>setTS(e.target.value)} className={fld}>{TARGET_SPLITS.map(t=><option key={t}>{t}</option>)}</select></label><label className="block"><span className="text-[12px] font-medium text-zinc-600">Target KPI Result</span><input type="number" value={kpiResult||""} onChange={e=>setKR(Number(e.target.value))} className={`${fld} tabular-nums`}/></label><label className="block"><span className="text-[12px] font-medium text-zinc-600">CPR</span><input type="number" value={cpr||""} onChange={e=>setCPR(Number(e.target.value))} className={`${fld} tabular-nums`}/></label></div>
      <div className="flex items-center gap-2"><span className="text-[12px] font-medium text-zinc-600">Creator:</span><div className="inline-flex rounded-lg border border-zinc-200 p-0.5 text-[13px]"><button onClick={()=>setCT("KOL")} className={`rounded-md px-3 py-1 font-medium ${creatorType==="KOL"?"bg-indigo-600 text-white":"text-zinc-500"}`}>KOL</button><button onClick={()=>setCT("Brand")} className={`rounded-md px-3 py-1 font-medium ${creatorType==="Brand"?"bg-indigo-600 text-white":"text-zinc-500"}`}>Brand</button></div></div>
      <div className="rounded-lg border border-zinc-200 p-3 space-y-3"><span className="text-[12px] font-semibold text-zinc-700">{creatorType==="KOL"?"KOL Names":"Content Names"}</span><div className="flex gap-2"><textarea value={pasteText} onChange={e=>setPT(e.target.value)} rows={2} placeholder="Paste names (one per line)" className="flex-1 rounded-lg border border-zinc-200 px-3 py-2 font-mono text-[13px] outline-none resize-y"/><button onClick={parsePaste} disabled={!pasteText.trim()} className="self-end rounded-lg bg-indigo-600 px-3 py-2 text-[13px] font-medium text-white disabled:opacity-40">Add</button></div>{entries.length>0&&<div className="space-y-1.5 max-h-48 overflow-y-auto">{entries.map((e,i)=><div key={i} className="flex items-center gap-1.5 rounded-md bg-zinc-50 px-2 py-1.5"><span className="w-5 text-[10px] text-zinc-300 text-right">{i+1}</span><input value={e.name} onChange={ev=>updEntry(i,{name:ev.target.value})} className="flex-1 rounded border border-zinc-200 px-2 py-1 text-[13px] outline-none" placeholder="Name"/>{creatorType==="KOL"&&<><select value={e.tier} onChange={ev=>updEntry(i,{tier:ev.target.value})} className="w-20 rounded border border-zinc-200 px-1 py-1 text-[12px] outline-none">{KOL_TIERS.map(t=><option key={t}>{t}</option>)}</select><select value={e.type} onChange={ev=>updEntry(i,{type:ev.target.value})} className="w-24 rounded border border-zinc-200 px-1 py-1 text-[12px] outline-none">{KOL_TYPES.map(t=><option key={t}>{t}</option>)}</select></>}<input value={e.expireCode} onChange={ev=>updEntry(i,{expireCode:ev.target.value})} className="w-24 rounded border border-zinc-200 px-2 py-1 text-[12px] outline-none" placeholder="Expire"/><button onClick={()=>delEntry(i)} className="text-zinc-400 hover:text-rose-600"><Trash2 size={14}/></button></div>)}</div>}<p className="text-[11px] text-zinc-400">{entries.length} {creatorType==="KOL"?"KOL":"content"}{entries.length!==1?"s":""}</p></div>
      <div className="rounded-lg border border-zinc-200 p-3 space-y-2"><span className="text-[12px] font-semibold text-zinc-700">Audiences (Cartesian expansion)</span><div className="flex flex-wrap gap-2">{AUDIENCE_OPTS.map(a=><label key={a} className={`flex items-center gap-1.5 rounded-full border px-3 py-1 text-[12px] font-medium cursor-pointer ${audiences.has(a)?"border-indigo-200 bg-indigo-50 text-indigo-700":"border-zinc-200 text-zinc-500"}`}><input type="checkbox" checked={audiences.has(a)} onChange={()=>toggleAud(a)} className="h-3.5 w-3.5 accent-indigo-600"/> {a}</label>)}</div><div className="flex items-center gap-2"><span className="text-[11px] text-zinc-500">Custom:</span><input value={customAud} onChange={e=>setCA(e.target.value)} placeholder="Prospect-Mom, Prospect-Lifestyle" className="flex-1 rounded-lg border border-zinc-200 px-2.5 py-1.5 text-[12px] outline-none"/></div><p className="text-[11px] text-zinc-400">{allAuds.length} audience{allAuds.length!==1?"s":""} × {entries.length} = <b>{totalRows}</b> rows</p></div>
      <div className="grid grid-cols-2 gap-3"><label className="block"><span className="text-[12px] font-medium text-zinc-600">Year</span><select value={year} onChange={e=>setYear(Number(e.target.value))} className={fld}>{YEARS.map(y=><option key={y}>{y}</option>)}</select></label><label className="block"><span className="text-[12px] font-medium text-zinc-600">Month</span><select value={monthSel} onChange={e=>setMS(e.target.value)} className={fld}>{[...MONTHS,"Custom"].map(m=><option key={m}>{m}</option>)}</select></label></div>
      {monthSel==="Custom"&&<input value={monthCustom} onChange={e=>setMC(e.target.value)} placeholder="e.g. Q2-Q3" className={fld}/>}
      <div className="rounded-lg border border-zinc-200 p-3"><label className="flex items-center gap-2 text-[13px] font-medium text-zinc-700"><input type="checkbox" checked={useReserve} onChange={e=>setUR(e.target.checked)} className="h-4 w-4 rounded accent-indigo-600"/> Reserve budget</label>{useReserve&&<div className="mt-2 flex flex-wrap items-center gap-2"><input type="number" value={reserveVal||""} onChange={e=>setRV(Number(e.target.value))} className="w-28 rounded-lg border border-zinc-200 px-2.5 py-1.5 text-[13px] tabular-nums outline-none"/><div className="inline-flex rounded-lg border border-zinc-200 p-0.5 text-[12px]"><button onClick={()=>setRM("amount")} className={`rounded-md px-2.5 py-1 font-medium ${reserveMode==="amount"?"bg-indigo-600 text-white":"text-zinc-500"}`}>฿</button><button onClick={()=>setRM("percent")} className={`rounded-md px-2.5 py-1 font-medium ${reserveMode==="percent"?"bg-indigo-600 text-white":"text-zinc-500"}`}>%</button></div><span className="text-[12px] text-zinc-400">= {fmt(reserveTotal)}</span></div>}</div>
      <div className="rounded-lg border border-zinc-200 p-3"><label className="flex items-center gap-2 text-[13px] font-medium text-zinc-700"><input type="checkbox" checked={splitEqually} onChange={e=>setSE(e.target.checked)} className="h-4 w-4 rounded accent-indigo-600"/> Split equally?</label>{splitEqually&&totalRows>0&&Number(limitBudget)>0&&<div className="mt-2 flex items-center gap-2 rounded-md bg-indigo-50 px-3 py-2 text-[12px] text-indigo-700"><Wand2 size={14}/><span className="tabular-nums">{fmt(allocatable)} ÷ {totalRows} = <b>{fmt(perRow)}</b>/row</span></div>}</div>
    </div>
    <div className="sticky bottom-0 flex items-center justify-between gap-2 border-t border-zinc-200 bg-white px-5 py-3 z-10"><span className="text-[11px] text-zinc-400">{totalRows} row{totalRows!==1?"s":""}</span><div className="flex gap-2"><button onClick={onClose} className="rounded-lg border border-zinc-200 px-4 py-1.5 text-[13px] font-medium text-zinc-600 hover:bg-zinc-50">Cancel</button><button onClick={submit} disabled={!canSubmit} className="rounded-lg bg-indigo-600 px-4 py-1.5 text-[13px] font-medium text-white hover:bg-indigo-700 disabled:opacity-40">Create</button></div></div>
  </div></div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
