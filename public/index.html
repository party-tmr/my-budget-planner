                        <td className="px-2 py-2">{r.startDate?<DCell value={r.startDate} onChange={v=>upd(r.id,{startDate:v})}/>:<span className="text-zinc-300">—</span>}</td>
                        <td className="px-2 py-2">{r.endDate?<DCell value={r.endDate} onChange={v=>upd(r.id,{endDate:v})}/>:<span className="text-zinc-300">—</span>}</td>
                        <td className={`px-2 py-2 text-right tabular-nums ${CL}`}>{m.totalDays}</td>
                        <td className={`px-2 py-2 text-right tabular-nums ${CL}`}>{m.runLabel}</td>

                        {/* REQ7: Shows per-KOL limit */}

                        <td className="px-2 py-2 text-right tabular-nums text-zinc-400">{fmt(Math.round(cR/rs.length))}</td>
                        <td className="px-2 py-2 text-right min-w-[90px]"><Inp type="number" value={r.contentBudget} onChange={v=>upd(r.id,{contentBudget:v})} className="text-right font-semibold"/></td>
                        <td className={`px-2 py-2 text-right tabular-nums ${CL}`}>{fmt(m.dailyBudget)}</td>
                        <td className={`px-2 py-2 text-right tabular-nums ${CL}`}>{!hasActuals?<span className="text-zinc-400 italic text-[11px]">No data</span>:<div>{fmt(m.spent)}{importDate&&<div className="text-[9px] text-zinc-400">Updated: {fDS(importDate)}</div>}</div>}</td>
                        <td className="px-2 py-2 text-right">{r.actual==null?<span className="text-zinc-400 italic text-[11px]">No data</span>:<Inp type="number" value={r.actual} onChange={v=>upd(r.id,{actual:v})} className="text-right"/>}</td>
                        <td className="px-2 py-2 text-right"><Inp type="number" value={r.kpiTarget} onChange={v=>upd(r.id,{kpiTarget:v})} className="text-right"/>{r.cpr>0&&<div className="text-[9px] text-zinc-400">CPR: {r.cpr}</div>}</td>
                        <td className={`px-2 py-2 ${CL}`}><PBadge p={cp}/></td>
                      </tr>);})}
                    {/* REQ8: Campaign total summary row */}
                    <tr className="border-b border-zinc-200 bg-zinc-50/80">
                      <td className="px-2 py-1.5 pl-10 text-[11px] font-bold text-zinc-500 uppercase" colSpan={15}>Campaign Total</td>
                      <td className={`px-2 py-1.5 text-right text-[11px] font-bold tabular-nums ${!budgetOK?"text-rose-600":"text-zinc-700"}`}>{fmt(cL)}</td>
                      <td className="px-2 py-1.5 text-right text-[11px] font-bold tabular-nums text-zinc-700">{fmt(cR)}</td>
                      <td className={`px-2 py-1.5 text-right text-[11px] font-bold tabular-nums ${!budgetOK?"text-rose-600":"text-zinc-700"}`}>{fmt(cB)}</td>
                      <td colSpan={5}/>
                    </tr>
                    <tr className="border-b border-zinc-100"><td colSpan={23} className="pl-10 py-1"><button onClick={()=>addSubContent(head)} className="flex items-center gap-1 text-[11px] text-indigo-500 font-medium"><Plus size={12}/>Add content</button></td></tr>
                    </>}
                  </Fragment>);})}
              </Fragment>);})}
          </tbody></table></div>)}
        </section>

        <section className="overflow-hidden rounded-xl border border-indigo-200 bg-gradient-to-br from-indigo-50 to-white shadow-sm">
          <div className="flex items-center gap-2 border-b border-indigo-100 px-4 py-3"><div className="grid h-7 w-7 place-items-center rounded-md bg-gradient-to-br from-indigo-500 to-violet-600 text-white"><Sparkles size={15}/></div><h3 className="text-[14px] font-bold">AI Insights</h3></div>
          <div className="p-4">{!imported?<div className="flex items-center gap-3 rounded-lg border border-dashed border-indigo-200 bg-white/70 p-4 text-[13px] text-zinc-500"><Wand2 size={18} className="text-indigo-400"/>Click <b>Import</b> to activate.</div>:<ul className="space-y-2">{insights.map((ins,i)=>{const ic={alert:"text-rose-500",ok:"text-emerald-500"}[ins.tone];const I2={alert:AlertTriangle,ok:Trophy}[ins.tone];return<li key={i} className="flex items-start gap-2 text-[13px]"><I2 size={15} className={`mt-0.5 ${ic}`}/>{ins.text}</li>;})}</ul>}</div>
        </section>
      </main>
      </>)}

      {showForm&&<CampaignForm brands={allBrands} productsFor={productsFor} onAddProd={(b,n)=>setEP(p=>[...p,{brand:b,product:n}])} onRenameProd={(b,old,nw)=>{const batch=db.batch();rows.filter(r=>r.brand===b&&r.product===old).forEach(r=>batch.update(db.collection(COL).doc(r.id),{product:nw}));batch.commit();}} defaultBrand={brand} onClose={()=>setShowForm(false)} onCreate={addRows}/>}
      {editRow&&<EditModal row={editRow} brands={allBrands} productsFor={productsFor} onSave={p=>{upd(editRow.id,p);setEditRow(null);}} onClose={()=>setEditRow(null)}/>}
    </div>);
}

/* Edit Modal */
function EditModal({row,brands,productsFor,onSave,onClose}){const[br,sBr]=useState(row.brand);const pr=productsFor(br);const[pd,sPd]=useState(row.product);const[ts,sTs]=useState(row.targetSplit);const fld="mt-1 w-full rounded-lg border border-zinc-200 px-3 py-2 text-[14px] outline-none focus:border-indigo-400";return<div className="fixed inset-0 z-50 flex items-center justify-center bg-zinc-900/40 backdrop-blur-sm p-4" onClick={onClose}><div className="w-full max-w-sm rounded-2xl bg-white shadow-2xl" onClick={e=>e.stopPropagation()}><div className="flex items-center gap-2 border-b border-zinc-200 px-5 py-3"><Settings2 size={15} className="text-indigo-600"/><h2 className="text-[15px] font-bold">Edit</h2><button onClick={onClose} className="ml-auto p-1 text-zinc-400 hover:bg-zinc-100 rounded-md"><XIcon size={18}/></button></div><div className="space-y-4 p-5"><label className="block"><span className="text-[12px] font-medium text-zinc-600">Brand</span><select value={br} onChange={e=>{sBr(e.target.value);sPd(productsFor(e.target.value)[0]||"");}} className={fld}>{brands.map(b=><option key={b}>{b}</option>)}</select></label><label className="block"><span className="text-[12px] font-medium text-zinc-600">Product</span><select value={pd} onChange={e=>sPd(e.target.value)} className={fld}>{pr.map(p=><option key={p}>{p}</option>)}</select></label><label className="block"><span className="text-[12px] font-medium text-zinc-600">Target Split</span><select value={ts} onChange={e=>sTs(e.target.value)} className={fld}>{TARGET_SPLITS.map(t=><option key={t}>{t}</option>)}</select></label></div><div className="flex justify-end gap-2 border-t border-zinc-200 px-5 py-3"><button onClick={onClose} className="rounded-lg border border-zinc-200 px-4 py-1.5 text-[13px] font-medium text-zinc-600">Cancel</button><button onClick={()=>onSave({brand:br,product:pd,targetSplit:ts})} className="rounded-lg bg-indigo-600 px-4 py-1.5 text-[13px] font-medium text-white">Save</button></div></div></div>;}

/* === Campaign Form (REQ1-4: validation, multi-rule reserve, deduct per person, product inline edit) === */
function CampaignForm({brands,productsFor,onAddProd,onRenameProd,defaultBrand,onClose,onCreate}){
  const[br,sBr]=useState(defaultBrand);const pr=productsFor(br);const[pd,sPd]=useState(pr[0]||"");
  const[noAwo,sNoAwo]=useState(false);const[awoCust,sAwoCust]=useState("");
  const[limitB,sLimitB]=useState(0);const[obj,sObj]=useState("Purchase");const[goal,sGoal]=useState("Purchase");const[ts,sTs]=useState("Ad Group Level");const[ct2,sCt]=useState("KOL");
  const[kpiR,sKpiR2]=useState(0);const[cprV,sCprV2]=useState(0);const[lastKF,sLKF]=useState(null);
  const sKpiR=v=>{sKpiR2(v);if(v>0&&limitB>0)sCprV2(Math.round(limitB/v*100)/100);sLKF("k");};
  const sCprV=v=>{sCprV2(v);if(v>0&&limitB>0)sKpiR2(Math.round(limitB/v));sLKF("c");};
  const onLimCh=v=>{sLimitB(v);if(lastKF==="k"&&kpiR>0)sCprV2(Math.round(v/kpiR*100)/100);else if(lastKF==="c"&&cprV>0)sKpiR2(Math.round(v/cprV));};
  const[yr,sYr]=useState(2026);const[mo,sMo]=useState("June");const[moCust,sMoCust]=useState("");
  /* REQ3: Multi-rule reserve */
  const[resRules,setResRules]=useState([]);
  const addRule=()=>setResRules(r=>[...r,{scope:"tier",item:"",amount:0,type:"lumpsum"}]);
  const updRule=(i,p)=>setResRules(rs=>rs.map((r,j)=>j===i?{...r,...p}:r));
  const delRule=i=>setResRules(rs=>rs.filter((_,j)=>j!==i));
  const[splitEq,sSplitEq]=useState(true);const[customPcts,sCustomPcts]=useState("");
  const[kolNames,sKolNames]=useState("");const[kolTiers,sKolTiers]=useState("");const[kolTypes,sKolTypes]=useState("");const[kolExpires,sKolExpires]=useState("");
  const[auds,sAuds]=useState(new Set());const[custAuds,sCustAuds]=useState("");
  const togAud=a=>{const n=new Set(auds);n.has(a)?n.delete(a):n.add(a);sAuds(n);};
  const chBr=b=>{sBr(b);sPd(productsFor(b)[0]||"");};

  const names=kolNames.split("\n").map(s=>s.trim()).filter(Boolean);
  const tiers=kolTiers.split("\n").map(s=>s.trim());const types=kolTypes.split("\n").map(s=>s.trim());const expires=kolExpires.split("\n").map(s=>s.trim());
  const entries=names.map((name,i)=>({name,tier:tiers[i]||"-",type:types[i]||"-",expireCode:expires[i]||""}));
  const allAuds=useMemo(()=>{const a=[...auds];if(custAuds.trim())custAuds.split("\n").flatMap(l=>l.split(",")).map(s=>s.trim()).filter(Boolean).forEach(s=>{if(!a.includes(s))a.push(s);});return a.length>0?a:[""];},[auds,custAuds]);
  const hasAudience=allAuds.length>1||allAuds[0]!=="";
  const totalRows=entries.length*allAuds.length;

  /* REQ4: Compute total reserve with multi-rule engine */
  const totalReserve=useMemo(()=>computeTotalReserve(resRules,entries,allAuds),[resRules,entries,allAuds]);
  const allocatable=Math.max(0,(Number(limitB)||0)-totalReserve);
  const customAmts=useMemo(()=>{if(splitEq||!customPcts.trim())return null;const p=customPcts.split("\n").map(s=>Number(s.trim()));if(p.some(isNaN))return null;return p;},[splitEq,customPcts]);

  /* REQ1: Strict validation */
  const validationErrors=useMemo(()=>{
    const errs=[];if(!pd)errs.push("Select a product.");if(entries.length===0)errs.push("Add at least one KOL/content name.");if(Number(limitB)<=0)errs.push("Limit budget must be > 0.");
    if(totalReserve>Number(limitB))errs.push(`Total reserve (${f0(totalReserve)}) exceeds limit (${f0(limitB)}).`);
    if(!splitEq&&customAmts){
      const expectedLen=hasAudience?allAuds.length:entries.length;
      if(customAmts.length!==expectedLen)errs.push(`Custom amounts: expected ${expectedLen} values, got ${customAmts.length}.`);
      else{const sum=customAmts.reduce((s,v)=>s+v,0);if(Math.abs(sum+totalReserve-Number(limitB))>10)errs.push(`Budget mismatch: Σ custom (${f0(sum)}) + reserve (${f0(totalReserve)}) ≠ limit (${f0(limitB)}).`);}
    }
    return errs;
  },[pd,entries.length,limitB,totalReserve,splitEq,customAmts,hasAudience,allAuds.length]);
  const hasErrors=validationErrors.length>0;
  const canSubmit=!hasErrors&&entries.length>0&&Number(limitB)>0;

  /* Scope sub-items for rules */
  const scopeItems=scope=>scope==="tier"?[...new Set(entries.map(e=>e.tier).filter(t=>t&&t!=="-"))]:scope==="type"?[...new Set(entries.map(e=>e.type).filter(t=>t&&t!=="-"))]:scope==="audience"?allAuds.filter(a=>a):[];

  const genCId=()=>"c"+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  const submit=()=>{if(!canSubmit)return;let rowMonth,start,end;if(mo==="Custom"){rowMonth=moCust.trim();start="";end="";}else{const mi=MONTHS.indexOf(mo);const last=new Date(yr,mi+1,0).getDate();rowMonth=mo;start=`${yr}-${pad(mi+1)}-01`;end=`${yr}-${pad(mi+1)}-${pad(last)}`;}const cid=genCId();const nr=[];
    for(const aud of allAuds){entries.forEach((e,i)=>{
      let budget;if(splitEq){budget=totalRows>0?Math.round(allocatable/totalRows):0;}else if(!hasAudience){budget=customAmts&&customAmts[i]?customAmts[i]:0;}else{const ai=allAuds.indexOf(aud);const ab=customAmts&&customAmts[ai]?customAmts[ai]:0;budget=entries.length>0?Math.round(ab/entries.length):0;}
      const rowRes=calcRowReserve(e,aud,resRules,entries,allAuds);budget=Math.max(0,budget-rowRes);
      nr.push(mkS({campaignId:cid,brand:br,product:pd,noAwo,awoCustom:awoCust.trim(),contentKol:e.name,kolTier:ct2==="Brand"?"-":(e.tier||"-"),kolType:ct2==="Brand"?"-":(e.type||"-"),adPlatform:"TikTok",creatorType:ct2,targetSplit:ts,audience:aud,hasAudience,month:rowMonth,mediaObjective:obj,optimizationGoal:goal,expireCode:e.expireCode||"",expiredDate:parseFlexDate(e.expireCode)||"",startDate:start,endDate:end,contentBudget:budget,budgetLimit:Number(limitB)||0,reserveBudget:Math.round(totalReserve),equalSplit:splitEq,totalCampaignBudget:Number(limitB)||0,reserveTotal:totalReserve,kpiTarget:Number(kpiR)||0,cpr:Number(cprV)||0,actual:null}));});}
    onCreate(nr,{brand:br,product:pd});};

  const fld="mt-1 w-full rounded-lg border border-zinc-200 px-3 py-2 text-[14px] outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100";
  return<div className="fixed inset-0 z-50 flex items-end justify-center bg-zinc-900/40 backdrop-blur-sm sm:items-center sm:p-4" onClick={onClose}><div className="max-h-[92vh] w-full max-w-2xl overflow-y-auto rounded-t-2xl bg-white shadow-2xl sm:rounded-2xl" onClick={e=>e.stopPropagation()}>
    <div className="sticky top-0 flex items-center gap-2 border-b border-zinc-200 bg-white px-5 py-3 z-10"><Plus size={15} className="text-indigo-600"/><h2 className="text-[15px] font-bold">New campaign</h2><button onClick={onClose} className="ml-auto p-1 text-zinc-400 hover:bg-zinc-100 rounded-md"><XIcon size={18}/></button></div>
    <div className="space-y-4 p-5">
      <div className="grid grid-cols-2 gap-3">
        <label className="block"><span className="text-[12px] font-medium text-zinc-600">Brand</span><select value={br} onChange={e=>chBr(e.target.value)} className={fld}>{brands.map(b=><option key={b}>{b}</option>)}</select></label>
        {/* REQ2: Product picker with inline edit */}
        <div><span className="text-[12px] font-medium text-zinc-600">Product</span><ProductPicker value={pd} onChange={sPd} products={pr} onRename={(old,nw)=>{if(nw&&nw!==old){onRenameProd(br,old,nw);sPd(nw);}}} onAdd={n=>{onAddProd(br,n);sPd(n);}}/></div>
      </div>
      <div className="rounded-lg border border-zinc-200 p-3"><label className="flex items-center gap-2 text-[13px] font-medium text-zinc-700"><input type="checkbox" checked={noAwo} onChange={e=>sNoAwo(e.target.checked)} className="h-4 w-4 accent-indigo-600"/> No AWO</label>{noAwo&&<input value={awoCust} onChange={e=>sAwoCust(e.target.value)} placeholder="adhoc" className="mt-2 w-full rounded-lg border border-zinc-200 px-3 py-1.5 text-[13px] outline-none"/>}</div>
      <div className="grid grid-cols-2 gap-3">
        <label className="block"><span className="text-[12px] font-medium text-zinc-600">Limit Budget (฿)</span><input type="number" value={limitB||""} onChange={e=>onLimCh(Number(e.target.value))} className={`${fld} tabular-nums ${validationErrors.some(e=>e.includes("limit"))?"ring-2 ring-rose-400":""}`}/></label>
        <label className="block"><span className="text-[12px] font-medium text-zinc-600">Media Objective</span><select value={obj} onChange={e=>sObj(e.target.value)} className={fld}>{MEDIA_OBJ.map(o=><option key={o}>{o}</option>)}</select></label>
        <label className="block"><span className="text-[12px] font-medium text-zinc-600">Optimization Goal</span><select value={goal} onChange={e=>sGoal(e.target.value)} className={fld}>{OPT_GOALS.map(o=><option key={o}>{o}</option>)}</select></label>
        <label className="block"><span className="text-[12px] font-medium text-zinc-600">Target Split</span><select value={ts} onChange={e=>sTs(e.target.value)} className={fld}>{TARGET_SPLITS.map(t=><option key={t}>{t}</option>)}</select></label>
        <label className="block"><span className="text-[12px] font-medium text-zinc-600">Target KPI</span><input type="number" value={kpiR||""} onChange={e=>sKpiR(Number(e.target.value))} className={`${fld} tabular-nums`}/></label>
        <label className="block"><span className="text-[12px] font-medium text-zinc-600">Cost per Result</span><input type="number" step="0.01" value={cprV||""} onChange={e=>sCprV(Number(e.target.value))} className={`${fld} tabular-nums`}/></label>
      </div>
      <div className="flex items-center gap-2"><span className="text-[12px] font-medium text-zinc-600">Creator:</span><div className="inline-flex rounded-lg border border-zinc-200 p-0.5 text-[13px]"><button onClick={()=>sCt("KOL")} className={`rounded-md px-3 py-1 font-medium ${ct2==="KOL"?"bg-indigo-600 text-white":"text-zinc-500"}`}>KOL</button><button onClick={()=>sCt("Brand")} className={`rounded-md px-3 py-1 font-medium ${ct2==="Brand"?"bg-indigo-600 text-white":"text-zinc-500"}`}>Brand</button></div></div>
      <div className="rounded-lg border border-zinc-200 p-3 space-y-2"><span className="text-[12px] font-semibold text-zinc-700">{ct2==="KOL"?"KOL":"Content"} Entries</span>
        <div className={`grid gap-2 ${ct2==="KOL"?"grid-cols-4":"grid-cols-2"}`}><div><label className="text-[10px] font-semibold text-zinc-500 uppercase">Names</label><textarea value={kolNames} onChange={e=>sKolNames(e.target.value)} rows={4} placeholder={"Name1\nName2"} className="w-full rounded-lg border border-zinc-200 px-2 py-1.5 font-mono text-[12px] outline-none resize-y"/></div>{ct2==="KOL"&&<><div><label className="text-[10px] font-semibold text-zinc-500 uppercase">Tier</label><textarea value={kolTiers} onChange={e=>sKolTiers(e.target.value)} rows={4} placeholder={"Macro\nMicro"} className="w-full rounded-lg border border-zinc-200 px-2 py-1.5 font-mono text-[12px] outline-none resize-y"/></div><div><label className="text-[10px] font-semibold text-zinc-500 uppercase">Type</label><textarea value={kolTypes} onChange={e=>sKolTypes(e.target.value)} rows={4} placeholder={"Review\nTutorial"} className="w-full rounded-lg border border-zinc-200 px-2 py-1.5 font-mono text-[12px] outline-none resize-y"/></div></>}<div><label className="text-[10px] font-semibold text-zinc-500 uppercase">Expire</label><textarea value={kolExpires} onChange={e=>sKolExpires(e.target.value)} rows={4} placeholder={"12 Jul\nCODE"} className="w-full rounded-lg border border-zinc-200 px-2 py-1.5 font-mono text-[12px] outline-none resize-y"/></div></div>
        <p className="text-[11px] text-zinc-400">{entries.length} entries</p>
      </div>
      <div className="rounded-lg border border-zinc-200 p-3 space-y-2"><span className="text-[12px] font-semibold text-zinc-700">Audiences</span>
        <div className="flex flex-wrap gap-2">{AUDIENCE_OPTS.map(a=><label key={a} className={`flex items-center gap-1.5 rounded-full border px-3 py-1 text-[12px] font-medium cursor-pointer ${auds.has(a)?"border-indigo-200 bg-indigo-50 text-indigo-700":"border-zinc-200 text-zinc-500"}`}><input type="checkbox" checked={auds.has(a)} onChange={()=>togAud(a)} className="h-3.5 w-3.5 accent-indigo-600"/>{a}</label>)}</div>
        <textarea value={custAuds} onChange={e=>sCustAuds(e.target.value)} rows={2} placeholder="Custom (one per line)" className="w-full rounded-lg border border-zinc-200 px-2 py-1.5 font-mono text-[12px] outline-none resize-y"/>
        <p className="text-[11px] text-zinc-400">{hasAudience?`${allAuds.length} aud × ${entries.length} = ${totalRows} rows`:`No audience → ${entries.length} rows`}</p>
      </div>
      <div className="grid grid-cols-2 gap-3"><label className="block"><span className="text-[12px] font-medium text-zinc-600">Year</span><select value={yr} onChange={e=>sYr(Number(e.target.value))} className={fld}>{YEARS.map(y=><option key={y}>{y}</option>)}</select></label><label className="block"><span className="text-[12px] font-medium text-zinc-600">Month</span><select value={mo} onChange={e=>sMo(e.target.value)} className={fld}>{[...MONTHS,"Custom"].map(m=><option key={m}>{m}</option>)}</select></label></div>

      {/* REQ3: Multi-rule reserve budget */}
      <div className="rounded-lg border border-zinc-200 p-3 space-y-3">
        <div className="flex items-center justify-between"><span className="text-[12px] font-semibold text-zinc-700">Reserve Budget Rules</span><button onClick={addRule} className="flex items-center gap-1 text-[12px] text-indigo-600 font-medium"><Plus size={13}/>Add Rule</button></div>
        {resRules.length===0&&<p className="text-[11px] text-zinc-400">No reserve rules. Click "Add Rule" to create one.</p>}
        {resRules.map((rule,i)=>{const items=scopeItems(rule.scope);return<div key={i} className="rounded-md bg-zinc-50 p-2.5 space-y-2">
          <div className="flex items-center justify-between"><span className="text-[11px] font-semibold text-zinc-500">Rule {i+1}</span><button onClick={()=>delRule(i)} className="text-zinc-400 hover:text-rose-600"><Trash2 size={13}/></button></div>
          <div className="flex flex-wrap items-center gap-2">
            <input type="number" value={rule.amount||""} onChange={e=>updRule(i,{amount:Number(e.target.value)})} placeholder="Amount" className="w-24 rounded border border-zinc-200 px-2 py-1 text-[12px] tabular-nums outline-none"/>
            <span className="text-[11px] text-zinc-500">for</span>
            <select value={rule.scope} onChange={e=>updRule(i,{scope:e.target.value,item:""})} className="rounded border border-zinc-200 px-2 py-1 text-[12px] outline-none">{["tier","type","audience","total"].map(s=><option key={s}>{s}</option>)}</select>
            {rule.scope!=="total"&&<select value={rule.item} onChange={e=>updRule(i,{item:e.target.value})} className="rounded border border-zinc-200 px-2 py-1 text-[12px] outline-none"><option value="">Select…</option>{items.map(s=><option key={s}>{s}</option>)}</select>}
          </div>
          <div className="flex items-center gap-2">{["lumpsum","perperson"].map(t=><label key={t} className={`flex items-center gap-1 rounded-full border px-2 py-0.5 text-[10px] font-medium cursor-pointer ${rule.type===t?"border-indigo-200 bg-indigo-50 text-indigo-700":"border-zinc-200 text-zinc-500"}`}><input type="radio" checked={rule.type===t} onChange={()=>updRule(i,{type:t})} className="h-3 w-3 accent-indigo-600"/>{t==="lumpsum"?"Lump Sum (ก้อนรวม)":"Deduct Per Person (หักต่อคน)"}</label>)}</div>
        </div>;})}
        {resRules.length>0&&<div className="text-[11px] font-semibold text-zinc-700 pt-1">Total Reserved: <span className={`tabular-nums ${totalReserve>Number(limitB)?"text-rose-600":"text-indigo-700"}`}>{fmt(totalReserve)}</span></div>}
      </div>

      <div className="rounded-lg border border-zinc-200 p-3 space-y-2">
        <label className="flex items-center gap-2 text-[13px] font-medium text-zinc-700"><input type="checkbox" checked={splitEq} onChange={e=>sSplitEq(e.target.checked)} className="h-4 w-4 accent-indigo-600"/> Split equally?</label>
        {splitEq&&totalRows>0&&limitB>0&&<div className="flex items-center gap-2 rounded-md bg-indigo-50 px-3 py-2 text-[12px] text-indigo-700"><Wand2 size={14}/><span className="tabular-nums">{fmt(allocatable)} ÷ {totalRows} = <b>{fmt(Math.round(allocatable/totalRows))}</b>/row</span></div>}
        {!splitEq&&<div><label className="text-[10px] font-semibold text-zinc-500 uppercase">{hasAudience?"Budget per audience group":"Budget per KOL"}</label><textarea value={customPcts} onChange={e=>sCustomPcts(e.target.value)} rows={3} placeholder={hasAudience?allAuds.filter(a=>a).map(a=>`${a}: amount`).join("\n"):entries.map(e=>`${e.name}: amount`).join("\n")} className={`w-full rounded-lg border px-2 py-1.5 font-mono text-[12px] outline-none resize-y ${validationErrors.some(e=>e.includes("custom"))?"border-rose-400 ring-2 ring-rose-200":"border-zinc-200"}`}/></div>}
      </div>

      {/* REQ1: Validation errors */}
      {hasErrors&&<div className="rounded-lg border border-rose-200 bg-rose-50 p-3 space-y-1">{validationErrors.map((e,i)=><div key={i} className="flex items-start gap-2 text-[12px] text-rose-700"><AlertTriangle size={14} className="mt-0.5 shrink-0"/>{e}</div>)}</div>}
    </div>
    <div className="sticky bottom-0 flex items-center justify-between border-t border-zinc-200 bg-white px-5 py-3 z-10"><span className="text-[11px] text-zinc-400">{totalRows} rows · Limit: {fmt(limitB)} · Reserve: {fmt(totalReserve)}</span><div className="flex gap-2"><button onClick={onClose} className="rounded-lg border border-zinc-200 px-4 py-1.5 text-[13px] font-medium text-zinc-600">Cancel</button><button onClick={submit} disabled={!canSubmit} className={`rounded-lg px-4 py-1.5 text-[13px] font-medium text-white ${canSubmit?"bg-indigo-600":"bg-zinc-300 cursor-not-allowed"}`}>Create</button></div></div>
  </div></div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
