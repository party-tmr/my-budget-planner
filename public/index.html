function Donut({data,title,size=130}){const total=data.reduce((s,d)=>s+d.value,0);if(!total)return null;const colors=["#4f46e5","#0ea5e9","#10b981","#f59e0b","#ef4444","#8b5cf6","#14b8a6","#ec4899","#f97316","#6366f1"];const r=size/2-14,circ=2*Math.PI*r;let cum=0;const segs=data.filter(d=>d.value>0).map((d,i)=>{const pct=d.value/total;const off=cum;cum+=pct;return{...d,pct,off,color:colors[i%colors.length]};});return<div className="flex flex-col items-center"><svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#f4f4f5" strokeWidth={18}/>{segs.map((s,i)=><circle key={i} cx={size/2} cy={size/2} r={r} fill="none" stroke={s.color} strokeWidth={18} strokeDasharray={`${s.pct*circ} ${circ}`} strokeDashoffset={-s.off*circ} transform={`rotate(-90 ${size/2} ${size/2})`} strokeLinecap="round"/>)}<text x={size/2} y={size/2} textAnchor="middle" dominantBaseline="central" className="text-[13px] font-bold fill-zinc-700">{f0(total)}</text></svg><p className="mt-1 text-[12px] font-semibold text-zinc-700">{title}</p><div className="flex flex-wrap justify-center gap-x-3 gap-y-1 mt-1.5">{segs.map((s,i)=><span key={i} className="flex items-center gap-1 text-[10px] text-zinc-500"><span style={{background:s.color}} className="w-2 h-2 rounded-full shrink-0"/>{s.name} {Math.round(s.pct*100)}%</span>)}</div></div>;}

  const matrixBrands=Array.from(new Set(matrix.map(m=>m.brand)));

  const matrixMonths=Array.from(new Set(matrix.map(m=>m.month))).sort((a,b)=>MONTHS.indexOf(a)-MONTHS.indexOf(b));
  const getLimit=(b,p,mo)=>{const found=matrix.find(m=>m.brand===b&&m.product===p&&m.month===mo);return found?found.limit:0;};

  /* Card 3: Platform spend */
  const platSpend=useMemo(()=>{const m=new Map();enriched.forEach(r=>{const k=r.adPlatform;m.set(k,(m.get(k)||0)+(Number(r.contentBudget)||0));});return Array.from(m.entries()).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value);},[enriched]);
  /* Card 4: Status overview */
  const statusCounts=useMemo(()=>{const m={Waiting:0,New:0,Active:0,Complete:0};enriched.forEach(r=>{m[r.m.status]=(m[r.m.status]||0)+1;});return m;},[enriched]);

        <div className="rounded-xl border border-zinc-200 bg-white p-5 shadow-sm col-span-full">

          <div className="overflow-x-auto"><table className="w-full border-collapse text-[12px]"><thead><tr className="border-b border-zinc-200 text-zinc-400"><th className="px-3 py-2 text-left font-semibold">Brand / Product</th>{matrixMonths.map(mo=><th key={mo} className="px-3 py-2 text-right font-semibold">{MA[mo]||mo}</th>)}<th className="px-3 py-2 text-right font-semibold">Total</th></tr></thead><tbody>
          {matrixBrands.map(b=>{const prods=matrixProducts(b);return<Fragment key={b}>{prods.map((p,i)=>{const rowTotal=matrixMonths.reduce((s,mo)=>s+getLimit(b,p,mo),0);return<tr key={p} className="border-b border-zinc-100 hover:bg-zinc-50"><td className="px-3 py-2">{i===0&&<span className="font-bold text-zinc-900">{b} — </span>}<span className="text-zinc-700">{p}</span></td>{matrixMonths.map(mo=>{const v=getLimit(b,p,mo);return<td key={mo} className={`px-3 py-2 text-right tabular-nums ${v?"text-zinc-800 font-medium":"text-zinc-300"}`}>{v?fmt(v):"—"}</td>;})}<td className="px-3 py-2 text-right tabular-nums font-bold text-indigo-700">{fmt(rowTotal)}</td></tr>;})}</Fragment>;})}
          </tbody></table></div>
        </div>
        {/* Card 2: Content type breakdown */}
        <div className="rounded-xl border border-zinc-200 bg-white p-5 shadow-sm">
          <h3 className="text-[14px] font-bold text-zinc-800 mb-3">Budget by Content Type</h3>
          <div className="space-y-2">{Array.from(new Set(contentBreakdown.map(c=>c.brand))).map(b=><div key={b}><div className="text-[11px] font-semibold text-zinc-500 uppercase tracking-wider mb-1">{b}</div>{contentBreakdown.filter(c=>c.brand===b).sort((a,b2)=>b2.budget-a.budget).map(c=><div key={c.type} className="flex items-center justify-between py-1 px-2 rounded-md hover:bg-zinc-50"><span className="text-[12px] text-zinc-700">{c.type}</span><span className="text-[12px] font-semibold tabular-nums text-zinc-900">{fmt(c.budget)}</span></div>)}</div>)}</div>
        </div>
        {/* Card 3: Platform distribution */}
        <div className="rounded-xl border border-zinc-200 bg-white p-5 shadow-sm">
          <h3 className="text-[14px] font-bold text-zinc-800 mb-3">Platform Distribution</h3>

        <div className="rounded-xl border border-zinc-200 bg-white p-5 shadow-sm">

          {allBrands.map(b=>{const bRows=enriched.filter(r=>r.brand===b);const bLimit=bRows.reduce((s,r)=>s+(Number(r.budgetLimit)||0),0);const bBudget=bRows.reduce((s,r)=>s+(Number(r.contentBudget)||0),0);return<div key={b} className="flex items-center justify-between py-2 border-b border-zinc-100 last:border-0"><div><div className="text-[13px] font-semibold text-zinc-900">{b}</div><div className="text-[11px] text-zinc-400">{bRows.length} campaigns</div></div><div className="text-right"><div className="text-[13px] font-bold tabular-nums text-zinc-900">{fmt(bLimit)}</div><div className="text-[11px] text-zinc-400">Budget: {fmt(bBudget)}</div></div></div>;})}
        </div>
      </div>
    </main>
  );

e">Save</button></div></div></div>);}

function CampaignForm({brands,productsFor,onAddProd,defaultBrand,today,onClose,onCreate}){
  const[br,sBr]=useState(defaultBrand);const pr=productsFor(br);const[pd,sPd]=useState(pr[0]||"");const[addPr,sAddPr]=useState(false);const[np,sNp]=useState("");
  const[noAwo,sNoAwo]=useState(false);const[awoCust,sAwoCust]=useState("");
  const[limitB,sLimitB]=useState(0);const[obj,sObj]=useState("Purchase");const[goal,sGoal]=useState("Purchase");const[ts,sTs]=useState("Ad Group Level");
  const[ct2,sCt]=useState("KOL");const[kpiR,sKpiR]=useState(0);const[cpr,sCpr]=useState(0);
  const[yr,sYr]=useState(2026);const[mo,sMo]=useState("June");const[moCust,sMoCust]=useState("");
  const[useRes,sUseRes]=useState(false);const[resVal,sResVal]=useState(0);const[resMode,sResMode]=useState("amount");const[splitEq,sSplitEq]=useState(true);
  // Textarea-based inputs (auto-map by line number)
  const[kolNames,sKolNames]=useState("");const[kolTiers,sKolTiers]=useState("");const[kolTypes,sKolTypes]=useState("");const[kolExpires,sKolExpires]=useState("");
  // Audiences
  const[auds,sAuds]=useState(new Set(["Prospect"]));const[custAuds,sCustAuds]=useState("");
  const togAud=a=>{const n=new Set(auds);n.has(a)?n.delete(a):n.add(a);sAuds(n);};
  const chBr=b=>{sBr(b);sPd(productsFor(b)[0]||"");};
  const addProd=()=>{const n=np.trim();if(!n)return;onAddProd(br,n);sPd(n);sNp("");sAddPr(false);};

  const names=kolNames.split("\n").map(s=>s.trim()).filter(Boolean);
  const tiers=kolTiers.split("\n").map(s=>s.trim());
  const types=kolTypes.split("\n").map(s=>s.trim());
  const expires=kolExpires.split("\n").map(s=>s.trim());
  const entries=names.map((name,i)=>({name,tier:tiers[i]||"Macro",type:types[i]||"Review",expireCode:expires[i]||""}));

  const allAuds=useMemo(()=>{const a=[...auds];if(custAuds.trim())custAuds.split("\n").flatMap(l=>l.split(",")).map(s=>s.trim()).filter(Boolean).forEach(s=>{if(!a.includes(s))a.push(s);});return a;},[auds,custAuds]);
  const totalRows=entries.length*Math.max(1,allAuds.length);
  const resTotal=!useRes?0:resMode==="percent"?(Number(limitB)||0)*(Number(resVal)||0)/100:Number(resVal)||0;
  const alloc=Math.max(0,(Number(limitB)||0)-resTotal);const perRow=totalRows&&splitEq?Math.round(alloc/totalRows):0;
  const canSubmit=pd&&entries.length>0&&Number(limitB)>0&&allAuds.length>0;
  const genCId=()=>"c"+Date.now().toString(36)+Math.random().toString(36).slice(2,6);

  const submit=()=>{if(!canSubmit)return;let rowMonth,start,end;if(mo==="Custom"){rowMonth=moCust.trim();start="";end="";}else{const mi=MONTHS.indexOf(mo);const last=new Date(yr,mi+1,0).getDate();rowMonth=mo;start=`${yr}-${pad(mi+1)}-01`;end=`${yr}-${pad(mi+1)}-${pad(last)}`;}const cid=genCId();const resPerRow=totalRows?Math.round(resTotal/totalRows):0;const nr=[];for(const aud of allAuds){for(const e of entries){nr.push(mkS({campaignId:cid,brand:br,product:pd,noAwo,awoCustom:awoCust.trim(),contentKol:e.name,kolTier:ct2==="Brand"?"-":(e.tier==="-"?"-":e.tier),kolType:ct2==="Brand"?"-":(e.type==="-"?"-":e.type),adPlatform:"TikTok",creatorType:ct2,targetSplit:ts,audience:aud,month:rowMonth,mediaObjective:obj,optimizationGoal:goal,expireCode:e.expireCode||"",expiredDate:"",startDate:start,endDate:end,contentBudget:perRow,budgetLimit:Number(limitB)||0,reserveBudget:resPerRow,equalSplit:splitEq,totalCampaignBudget:Number(limitB)||0,reserveTotal:resTotal,kpiTarget:Number(kpiR)||0,cpr:Number(cpr)||0,actual:null}));}}onCreate(nr,{brand:br,product:pd});};

  const fld="mt-1 w-full rounded-lg border border-zinc-200 px-3 py-2 text-[14px] outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100";
  return(<div className="fixed inset-0 z-50 flex items-end justify-center bg-zinc-900/40 backdrop-blur-sm sm:items-center sm:p-4" onClick={onClose}><div className="max-h-[92vh] w-full max-w-2xl overflow-y-auto rounded-t-2xl bg-white shadow-2xl sm:rounded-2xl" onClick={e=>e.stopPropagation()}>
    <div className="sticky top-0 flex items-center gap-2 border-b border-zinc-200 bg-white px-5 py-3 z-10"><Plus size={15} className="text-indigo-600"/><h2 className="text-[15px] font-bold">New campaign</h2><button onClick={onClose} className="ml-auto p-1 text-zinc-400 hover:bg-zinc-100 rounded-md"><XIcon size={18}/></button></div>
    <div className="space-y-4 p-5">
      <div className="grid grid-cols-2 gap-3"><label className="block"><span className="text-[12px] font-medium text-zinc-600">Brand</span><select value={br} onChange={e=>chBr(e.target.value)} className={fld}>{brands.map(b=><option key={b}>{b}</option>)}</select></label><label className="block"><span className="text-[12px] font-medium text-zinc-600">Product</span><div className="mt-1 flex gap-1.5"><select value={pd} onChange={e=>sPd(e.target.value)} className="w-full rounded-lg border border-zinc-200 px-3 py-2 text-[14px] outline-none">{pr.length===0&&<option value="">Add →</option>}{pr.map(p=><option key={p}>{p}</option>)}</select><button onClick={()=>sAddPr(v=>!v)} className="grid h-9 w-9 shrink-0 place-items-center rounded-lg border border-zinc-200 text-indigo-600 hover:bg-indigo-50"><Plus size={16}/></button></div>{addPr&&<div className="mt-1.5 flex gap-1.5"><input autoFocus value={np} onChange={e=>sNp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addProd()} placeholder="New product" className="w-full rounded-lg border border-indigo-200 px-2.5 py-1.5 text-[13px] outline-none"/><button onClick={addProd} className="rounded-lg bg-indigo-600 px-3 text-[13px] font-medium text-white">Add</button></div>}</label></div>
      <div className="rounded-lg border border-zinc-200 p-3"><label className="flex items-center gap-2 text-[13px] font-medium text-zinc-700"><input type="checkbox" checked={noAwo} onChange={e=>sNoAwo(e.target.checked)} className="h-4 w-4 accent-indigo-600"/> No AWO</label>{noAwo?<input value={awoCust} onChange={e=>sAwoCust(e.target.value)} placeholder="e.g. adhoc" className="mt-2 w-full rounded-lg border border-zinc-200 px-3 py-1.5 text-[13px] outline-none"/>:<p className="mt-1 text-[11px] text-zinc-400">Default: AWO</p>}</div>
      <div className="grid grid-cols-2 gap-3"><label className="block"><span className="text-[12px] font-medium text-zinc-600">Limit Budget (฿)</span><input type="number" value={limitB||""} onChange={e=>sLimitB(Number(e.target.value))} className={`${fld} tabular-nums`}/></label><label className="block"><span className="text-[12px] font-medium text-zinc-600">Media Objective</span><select value={obj} onChange={e=>sObj(e.target.value)} className={fld}>{MEDIA_OBJ.map(o=><option key={o}>{o}</option>)}</select></label><label className="block"><span className="text-[12px] font-medium text-zinc-600">Optimization Goal</span><select value={goal} onChange={e=>sGoal(e.target.value)} className={fld}>{OPT_GOALS.map(o=><option key={o}>{o}</option>)}</select></label><label className="block"><span className="text-[12px] font-medium text-zinc-600">Target Split</span><select value={ts} onChange={e=>sTs(e.target.value)} className={fld}>{TARGET_SPLITS.map(t=><option key={t}>{t}</option>)}</select></label><label className="block"><span className="text-[12px] font-medium text-zinc-600">Target KPI Result</span><input type="number" value={kpiR||""} onChange={e=>sKpiR(Number(e.target.value))} className={`${fld} tabular-nums`}/></label><label className="block"><span className="text-[12px] font-medium text-zinc-600">Cost per Result</span><input type="number" step="0.01" value={cpr||""} onChange={e=>sCpr(Number(e.target.value))} className={`${fld} tabular-nums`}/></label></div>
      <div className="flex items-center gap-2"><span className="text-[12px] font-medium text-zinc-600">Creator:</span><div className="inline-flex rounded-lg border border-zinc-200 p-0.5 text-[13px]"><button onClick={()=>sCt("KOL")} className={`rounded-md px-3 py-1 font-medium ${ct2==="KOL"?"bg-indigo-600 text-white":"text-zinc-500"}`}>KOL</button><button onClick={()=>sCt("Brand")} className={`rounded-md px-3 py-1 font-medium ${ct2==="Brand"?"bg-indigo-600 text-white":"text-zinc-500"}`}>Brand</button></div></div>

      {/* Textarea-based KOL/Content inputs — auto-mapped by line number */}
      <div className="rounded-lg border border-zinc-200 p-3 space-y-2">
        <span className="text-[12px] font-semibold text-zinc-700">{ct2==="KOL"?"KOL Entries":"Content Entries"} <span className="font-normal text-zinc-400">— one per line, auto-mapped by line number</span></span>
        <div className={`grid gap-2 ${ct2==="KOL"?"grid-cols-4":"grid-cols-2"}`}>
          <div><label className="text-[10px] font-semibold text-zinc-500 uppercase">Names</label><textarea value={kolNames} onChange={e=>sKolNames(e.target.value)} rows={5} placeholder={"MaiReviews\nBeautyByNin\nSkinByLin"} className="w-full rounded-lg border border-zinc-200 px-2.5 py-2 font-mono text-[12px] outline-none resize-y"/></div>
          {ct2==="KOL"&&<><div><label className="text-[10px] font-semibold text-zinc-500 uppercase">Tier</label><textarea value={kolTiers} onChange={e=>sKolTiers(e.target.value)} rows={5} placeholder={"Macro\nMicro\nNano"} className="w-full rounded-lg border border-zinc-200 px-2.5 py-2 font-mono text-[12px] outline-none resize-y"/></div><div><label className="text-[10px] font-semibold text-zinc-500 uppercase">Type</label><textarea value={kolTypes} onChange={e=>sKolTypes(e.target.value)} rows={5} placeholder={"Review\nTutorial\nLivestream"} className="w-full rounded-lg border border-zinc-200 px-2.5 py-2 font-mono text-[12px] outline-none resize-y"/></div></>}
          <div><label className="text-[10px] font-semibold text-zinc-500 uppercase">Expire Code</label><textarea value={kolExpires} onChange={e=>sKolExpires(e.target.value)} rows={5} placeholder={"CODE-A\nCODE-B\n"} className="w-full rounded-lg border border-zinc-200 px-2.5 py-2 font-mono text-[12px] outline-none resize-y"/></div>
        </div>
        <p className="text-[11px] text-zinc-400">{entries.length} {ct2==="KOL"?"KOL":"content"}{entries.length!==1?"s":""} detected</p>
      </div>

      {/* Audiences — multi-select + multi-line custom */}
      <div className="rounded-lg border border-zinc-200 p-3 space-y-2">
        <span className="text-[12px] font-semibold text-zinc-700">Audiences <span className="font-normal text-zinc-400">→ Cartesian expansion</span></span>
        <div className="flex flex-wrap gap-2">{AUDIENCE_OPTS.map(a=><label key={a} className={`flex items-center gap-1.5 rounded-full border px-3 py-1 text-[12px] font-medium cursor-pointer ${auds.has(a)?"border-indigo-200 bg-indigo-50 text-indigo-700":"border-zinc-200 text-zinc-500"}`}><input type="checkbox" checked={auds.has(a)} onChange={()=>togAud(a)} className="h-3.5 w-3.5 accent-indigo-600"/>{a}</label>)}</div>
        <div><label className="text-[10px] font-semibold text-zinc-500 uppercase">Custom Audiences <span className="font-normal">(one per line or comma-separated)</span></label><textarea value={custAuds} onChange={e=>sCustAuds(e.target.value)} rows={2} placeholder={"Prospect-Mom\nProspect-Lifestyle, Interest-Beauty"} className="w-full rounded-lg border border-zinc-200 px-2.5 py-1.5 font-mono text-[12px] outline-none resize-y"/></div>
        <p className="text-[11px] text-zinc-400">{allAuds.length} audience{allAuds.length!==1?"s":""} × {entries.length} = <b>{totalRows}</b> rows</p>
      </div>

      <div className="grid grid-cols-2 gap-3"><label className="block"><span className="text-[12px] font-medium text-zinc-600">Year</span><select value={yr} onChange={e=>sYr(Number(e.target.value))} className={fld}>{YEARS.map(y=><option key={y}>{y}</option>)}</select></label><label className="block"><span className="text-[12px] font-medium text-zinc-600">Month</span><select value={mo} onChange={e=>sMo(e.target.value)} className={fld}>{[...MONTHS,"Custom"].map(m=><option key={m}>{m}</option>)}</select></label></div>
      {mo==="Custom"&&<input value={moCust} onChange={e=>sMoCust(e.target.value)} placeholder="Q2-Q3" className={fld}/>}

      <div className="rounded-lg border border-zinc-200 p-3"><label className="flex items-center gap-2 text-[13px] font-medium text-zinc-700"><input type="checkbox" checked={useRes} onChange={e=>sUseRes(e.target.checked)} className="h-4 w-4 accent-indigo-600"/> Reserve budget</label>{useRes&&<div className="mt-2 flex flex-wrap items-center gap-2"><input type="number" value={resVal||""} onChange={e=>sResVal(Number(e.target.value))} className="w-28 rounded-lg border border-zinc-200 px-2.5 py-1.5 text-[13px] tabular-nums outline-none"/><div className="inline-flex rounded-lg border border-zinc-200 p-0.5 text-[12px]"><button onClick={()=>sResMode("amount")} className={`rounded-md px-2.5 py-1 font-medium ${resMode==="amount"?"bg-indigo-600 text-white":"text-zinc-500"}`}>฿</button><button onClick={()=>sResMode("percent")} className={`rounded-md px-2.5 py-1 font-medium ${resMode==="percent"?"bg-indigo-600 text-white":"text-zinc-500"}`}>%</button></div><span className="text-[12px] text-zinc-400">= {fmt(resTotal)}</span></div>}</div>
      <div className="rounded-lg border border-zinc-200 p-3"><label className="flex items-center gap-2 text-[13px] font-medium text-zinc-700"><input type="checkbox" checked={splitEq} onChange={e=>sSplitEq(e.target.checked)} className="h-4 w-4 accent-indigo-600"/> Split equally?</label>{splitEq&&totalRows>0&&Number(limitB)>0&&<div className="mt-2 flex items-center gap-2 rounded-md bg-indigo-50 px-3 py-2 text-[12px] text-indigo-700"><Wand2 size={14}/><span className="tabular-nums">{fmt(alloc)} ÷ {totalRows} = <b>{fmt(perRow)}</b>/row</span></div>}</div>
    </div>
    <div className="sticky bottom-0 flex items-center justify-between border-t border-zinc-200 bg-white px-5 py-3 z-10"><span className="text-[11px] text-zinc-400">{totalRows} row{totalRows!==1?"s":""}</span><div className="flex gap-2"><button onClick={onClose} className="rounded-lg border border-zinc-200 px-4 py-1.5 text-[13px] font-medium text-zinc-600">Cancel</button><button onClick={submit} disabled={!canSubmit} className="rounded-lg bg-indigo-600 px-4 py-1.5 text-[13px] font-medium text-white disabled:opacity-40">Create</button></div></div>
  </div></div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
